name: Aggiorna Dati Basket Roma

on:
  schedule:
    # Run serali ogni ora dalle 18:00 alle 23:00 ora italiana
    # Coprono sia estate (UTC+2) che inverno (UTC+1)
    - cron: '0 16 * * *'   # 18:00 estate / 17:00 inverno
    - cron: '0 17 * * *'   # 19:00 estate / 18:00 inverno
    - cron: '0 18 * * *'   # 20:00 estate / 19:00 inverno
    - cron: '0 19 * * *'   # 21:00 estate / 20:00 inverno
    - cron: '0 20 * * *'   # 22:00 estate / 21:00 inverno
    - cron: '0 21 * * *'   # 23:00 estate / 22:00 inverno
    # Run notturna alle 04:00 italiane
    - cron: '0 2 * * *'    # 04:00 estate (UTC+2)
    - cron: '0 3 * * *'    # 04:00 inverno (UTC+1)
  workflow_dispatch:

# Concurrency guard: una sola run alla volta.
concurrency:
  group: update-data
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # STEP 1: v8.9 (legacy)
      - name: Esegui aggiornamento dati (v8.9 legacy)
        run: python scripts/update_data.py

      # ──────────────────────────────────────────────────────────────────
      # STEP 1bis: cleanup partite spurie v9 deducer.
      # Il deducer Fase 2.2 di v9 ha un bug che assegna date errate alle
      # partite Finale dedotte (es. 8/5 invece di 8/6, off-by-one-month).
      # Quando --write-legacy era abilitato, queste finivano in data.json
      # con id "v_po_f_g*". Dopo il rollback, v8.9 non le elimina (non
      # essendo sue) e restano in data.json corrompendo il frontend.
      #
      # Questo step rimuove le partite con id che inizia per "v_po_f_g"
      # da data.json. Idempotente: no-op se non ne trova.
      # Permanente come safety net finché il deducer non viene fixato.
      # ──────────────────────────────────────────────────────────────────
      - name: Cleanup partite spurie v9 deducer
        run: |
          python3 << 'PYEOF'
          import json
          with open('data.json') as f:
              d = json.load(f)
          before = len(d['matches'])
          # Rimuovi tutte le partite con id che inizia per "v_po_f_g"
          # (artefatti del deducer v9 Fase 2.2 con date errate)
          d['matches'] = [m for m in d['matches']
                          if not str(m.get('id', '')).startswith('v_po_f_g')]
          after = len(d['matches'])
          if after < before:
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(d, f, indent=2, ensure_ascii=False)
              print(f'🧹 Cleanup: rimosse {before - after} partite spurie v9 deducer')
          else:
              print('✅ Cleanup: nessuna partita spuria, data.json già pulito')
          PYEOF

      # STEP 2: arricchimento v9 (solo data-v9.json, NO --write-legacy)
      - name: Esegui arricchimento v9 (solo data-v9.json)
        continue-on-error: true
        run: python scripts/main.py --out-v9 data-v9.json

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name "Roma Basket Bot"
          git config user.email "bot@romabasket.app"
          git add data.json data-v9.json
          git diff --staged --quiet && echo "Nessuna modifica" || (git commit -m "🏀 Aggiornamento dati $(date +'%d/%m/%Y %H:%M')" && git push)
