name: Aggiorna Dati Basket Roma

on:
  schedule:
    # Run serali ogni ora dalle 18:00 alle 23:00 ora italiana
    # Coprono sia estate (UTC+2) che inverno (UTC+1)
    - cron: '0 16 * * *'   # 18:00 estate / 17:00 inverno
    - cron: '0 17 * * *'   # 19:00 estate / 18:00 inverno
    - cron: '0 18 * * *'   # 20:00 estate / 19:00 inverno
    - cron: '0 19 * * *'   # 21:00 estate / 20:00 inverno
    - cron: '0 20 * * *'   # 22:00 estate / 21:00 inverno
    - cron: '0 21 * * *'   # 23:00 estate / 22:00 inverno
    # Run notturna alle 04:00 italiane
    - cron: '0 2 * * *'    # 04:00 estate (UTC+2)
    - cron: '0 3 * * *'    # 04:00 inverno (UTC+1)
  workflow_dispatch:

# Concurrency guard: serializza esecuzioni del workflow.
# Se un cron parte mentre una run manuale (workflow_dispatch) sta girando
# — o viceversa — la nuova attende che la precedente finisca invece di
# lanciarsi in parallelo. Previene push concorrenti su data.json che
# fallirebbero con "non-fast-forward". Una sola run alla volta, sempre.
concurrency:
  group: update-data
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ──────────────────────────────────────────────────────────────────
      # STEP 1: v8.9.2 (legacy, produzione attiva).
      # Fetcha regular season Virtus + Luiss da fonti varie. Scrive
      # data.json (schema legacy v8.9).
      # ──────────────────────────────────────────────────────────────────
      - name: Esegui aggiornamento dati (v8.9 legacy)
        run: python scripts/update_data.py

      # ──────────────────────────────────────────────────────────────────
      # STEP 2: arricchimento v9 (additivo, non bloccante).
      # Legge data.json appena aggiornato da v8.9 e produce data-v9.json
      # con:
      #   - schedule playoff dedotto (Fase 2.2 next-round deducer)
      #   - tabellino LNP con score+parziali (Fase 2.3a)
      #   - discovery automatica match_id (Fase 2.3b via pagina avversario)
      #   - sources multipli, external_id, periods
      #
      # continue-on-error: TRUE
      #   Razionale: v9 e' layer di arricchimento, non sostitutivo. Se
      #   fallisce (LNP down, bug parser, regex regression, ecc.) il
      #   workflow continua, data.json v8.9 viene committato regolarmente
      #   e il frontend resta funzionante. Failure isolato -> zero impatto
      #   utenti, errore visibile solo nei log del workflow.
      # ──────────────────────────────────────────────────────────────────
      - name: Esegui arricchimento v9
        continue-on-error: true
        run: python scripts/main.py --out-v9 data-v9.json

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name "Roma Basket Bot"
          git config user.email "bot@romabasket.app"
          # add include data-v9.json: se v9 ha fallito (file non aggiornato
          # o assente) git add e' no-op safe e diff --staged --quiet rileva
          # l'assenza di modifiche.
          git add data.json data-v9.json
          git diff --staged --quiet && echo "Nessuna modifica" || (git commit -m "🏀 Aggiornamento dati $(date +'%d/%m/%Y %H:%M')" && git push)
