name: Controllo freschezza dati

# Verifica giornaliera che il workflow update-data sia girato
# CON SUCCESSO di recente. Se è fermo (cron rotto, GitHub down,
# repo archiviato, ecc.) il workflow fallisce e GitHub manda email.
#
# IMPORTANTE: controlla l'esecuzione del workflow, NON il timestamp
# dentro data.json. Il dato può non cambiare per giorni (es. fine
# stagione, periodo senza partite) — lo script gira correttamente
# ma salta il commit. Verificare data.json darebbe falsi positivi.
#
# Soglia 24h: lo schedule update-data.yml ha 8 run/giorno con gap
# massimo di 14h. 24h tollera un failure transitorio singolo, alerta
# se due cicli consecutivi falliscono (sintomo di problema reale).
#
# Verifica notifiche email attive:
# Settings personali GitHub → Notifications → Actions →
# "Send notifications for failed workflows only" deve essere ON.
on:
  schedule:
    - cron: '0 9 * * *'  # 11:00 IT estate / 10:00 IT inverno
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verifica ultima esecuzione riuscita di update-data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Recupera l'ultima run riuscita del workflow update-data.yml
          RESPONSE=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/update-data.yml/runs?status=success&per_page=1")

          LAST_RUN=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          runs = data.get('workflow_runs', [])
          if not runs:
              print('NONE')
          else:
              print(runs[0]['updated_at'])
          ")

          if [ "$LAST_RUN" = "NONE" ]; then
            echo "::error::Nessuna run riuscita trovata per update-data.yml"
            exit 1
          fi

          echo "Ultima run riuscita: $LAST_RUN"

          AGE_H=$(python3 -c "
          from datetime import datetime, timezone
          last = datetime.fromisoformat('$LAST_RUN'.replace('Z', '+00:00'))
          now = datetime.now(timezone.utc)
          print(f'{(now - last).total_seconds() / 3600:.1f}')
          ")

          # Soglia: 24h normale, 36h se off-season (lug-ago)
          MONTH=$(date -u +%m)
          if [ "$MONTH" = "07" ] || [ "$MONTH" = "08" ]; then
            MAX_AGE=36
          else
            MAX_AGE=24
          fi

          echo "Età: ${AGE_H}h (soglia: ${MAX_AGE}h)"

          if python3 -c "import sys; sys.exit(0 if float('$AGE_H') > $MAX_AGE else 1)"; then
            echo "::error::update-data.yml non gira con successo da ${AGE_H}h (limite ${MAX_AGE}h). Cron fermo o workflow rotto."
            exit 1
          fi

          echo "OK"
