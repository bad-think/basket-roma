name: Controllo freschezza dati

# Verifica giornaliera che data.json sia stato aggiornato di recente.
# Se è troppo vecchio (parser rotto, cron fermo, repo archiviato, ecc.)
# il workflow fallisce e GitHub manda email all'owner.
#
# Soglie tarate sullo schedule reale di update-data.yml:
# - Run alle 04:00 IT + 18:00-23:00 IT (8 run/giorno)
# - Gap massimo normale: 14h (tra 04:00 e 18:00 IT)
# - Soglia 18h: tollera un failure singolo della run notturna,
#   alerta se si perdono notte + serale (sintomo di problema sistemico)
#
# Verifica notifiche email attive:
# Settings personali GitHub → Notifications → Actions →
# "Send notifications for failed workflows only" deve essere ON.
on:
  schedule:
    - cron: '0 9 * * *'  # 11:00 IT estate / 10:00 IT inverno
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verifica età data.json
        run: |
          python3 <<'EOF'
          import json
          import sys
          from datetime import datetime, timezone

          with open('data.json') as f:
              data = json.load(f)

          last_str = data.get('last_updated', '')
          last = datetime.fromisoformat(last_str)
          if last.tzinfo is None:
              last = last.replace(tzinfo=timezone.utc)
          now = datetime.now(timezone.utc)
          age_h = (now - last).total_seconds() / 3600

          # Soglia: 18h normale, 30h se off-season (lug-ago)
          # In stagione lo schedule attuale lascia max 14h di gap
          # (tra 04:00 IT notturna e 18:00 IT prima serale)
          off_season = now.month in (7, 8)
          max_age_h = 30 if off_season else 18

          print(f"data.json last_updated: {last_str}")
          print(f"Età: {age_h:.1f}h (soglia: {max_age_h}h, off_season: {off_season})")

          if age_h > max_age_h:
              print(f"::error::data.json non aggiornato da {age_h:.1f}h "
                    f"(limite {max_age_h}h). Probabile cron fermo o parser rotto.")
              sys.exit(1)
          print("OK")
          EOF
