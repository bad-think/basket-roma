name: Test v9 (manual)

# Workflow di test per Basket Roma v9.0 — eseguibile SOLO manualmente.
# Non ha schedule cron, non scrive su data.json di main, non rompe v8.9.2.
#
# Produce due artifact:
# - data-v9.json       : output schema v9.0 nativo
# - data.json.legacy   : output v9.0 convertito in schema v8.9 (per cutover)
#
# Per lanciarlo:
# 1. Vai su Actions
# 2. Seleziona "Test v9 (manual)"
# 3. Click "Run workflow", scegli branch v9-rewrite, conferma

on:
  workflow_dispatch:
    inputs:
      compare_with_main:
        description: "Confronta output con data.json di main (true/false)"
        required: false
        default: "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-v9:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch corrente (v9-rewrite o altro)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verifica struttura v9
        run: |
          echo "=== File v9 attesi ==="
          test -f config/seasons/2025-26.json && echo "✅ config" || echo "❌ config mancante"
          test -f scripts/main.py && echo "✅ main.py" || echo "❌ main.py mancante"
          test -f scripts/core/models.py && echo "✅ models" || echo "❌ models mancante"
          test -f scripts/fetchers/lnp.py && echo "✅ lnp fetcher" || echo "❌ lnp fetcher mancante"

      - name: Esegui v9 (fetch reale)
        run: python scripts/main.py --out-v9 data-v9.json

      - name: Genera anche output legacy per confronto
        run: python scripts/main.py --out-v9 /tmp/skip.json --write-legacy --data data.json.legacy || true

      - name: Confronto con data.json di main (opzionale)
        if: ${{ github.event.inputs.compare_with_main == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Scarica data.json corrente da main
          gh api /repos/${{ github.repository }}/contents/data.json?ref=main \
            -H "Accept: application/vnd.github.v3.raw" > data.json.main || true

          if [ -s data.json.main ]; then
            echo "=== Confronto numero match ==="
            python3 -c "
          import json
          main_d = json.load(open('data.json.main'))
          v9 = json.load(open('data-v9.json'))
          print(f'main (v8.9): {len(main_d[\"matches\"])} matches')
          print(f'v9:          {len(v9[\"matches\"])} matches')
          delta = len(v9['matches']) - len(main_d['matches'])
          print(f'delta:       {delta:+d}')
          "
          else
            echo "⚠️  Nessun data.json su main per confronto"
          fi

      - name: Riepilogo
        run: |
          echo "=== Riepilogo run v9 ==="
          if [ -f data-v9.json ]; then
            python3 -c "
          import json
          d = json.load(open('data-v9.json'))
          print(f'Schema:      {d.get(\"\$schema_version\")}')
          print(f'Stagione:    {d[\"season\"]}')
          print(f'Matches:     {len(d[\"matches\"])}')
          print(f'Standings:   {list(d[\"standings\"].keys())}')
          sc = d['config'].get('series_closed', [])
          print(f'Series chiuse: {len(sc)}')
          for s in sc:
              adv = 'avanza' if s['team_advances'] else 'eliminata'
              print(f'  - {s[\"team_key\"]} vs {s[\"opponent\"]} ({s[\"round_name\"]}): {s[\"result\"]} → {adv}')
          "
          else
            echo "❌ data-v9.json non generato"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v9-output-${{ github.run_id }}
          path: |
            data-v9.json
            data.json.legacy
          retention-days: 7
