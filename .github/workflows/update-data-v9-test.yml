name: Test v9 (manual)

on:
  workflow_dispatch:

jobs:
  test-v9:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (branch corrente)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify v9 files present
        run: |
          echo "=== File v9 attesi ==="
          [ -f config/seasons/2025-26.json ] && echo "✅ config" || echo "❌ config (manca config/seasons/2025-26.json)"
          [ -f scripts/main.py ] && echo "✅ main.py" || echo "❌ main.py (manca scripts/main.py)"
          [ -f scripts/core/models.py ] && echo "✅ models" || echo "❌ models (manca scripts/core/models.py)"
          [ -f scripts/fetchers/lnp.py ] && echo "✅ lnp fetcher" || echo "❌ lnp fetcher (manca scripts/fetchers/lnp.py)"

      # ──────────────────────────────────────────────────────────────────
      # NUOVO: sync data.json da main prima di girare v9.
      # Evita di dover sincronizzare manualmente il branch v9-rewrite con
      # le scritture di cron v8.9 su main.
      # ──────────────────────────────────────────────────────────────────
      - name: Sync data.json from main branch
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "ℹ️  Già su main, skip sync"
            exit 0
          fi
          echo "📥 Pulling fresh data.json from main..."
          # Usa raw.githubusercontent per evitare di committare cose
          curl -sL --fail \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/data.json" \
            -o data.json
          if [ ! -s data.json ]; then
            echo "❌ data.json vuoto o non scaricato"
            exit 1
          fi
          MATCHES=$(python3 -c 'import json; print(len(json.load(open("data.json"))["matches"]))')
          LAST=$(python3 -c 'import json; print(json.load(open("data.json")).get("last_updated", "?"))')
          echo "✅ data.json from main: $MATCHES matches, last_updated=$LAST"

      - name: Run v9 fetcher (preserve existing data, output to data-v9.json)
        run: python scripts/main.py --out-v9 data-v9.json

      - name: Run v9 fetcher (write-legacy from scratch — sanity check)
        run: python scripts/main.py --out-v9 /tmp/skip.json --write-legacy --data data.json.legacy || true

      - name: Compare match count v9 vs main
        run: |
          echo "=== Confronto numero match ==="
          MAIN_COUNT=$(python3 -c 'import json; print(len(json.load(open("data.json"))["matches"]))')
          V9_COUNT=$(python3 -c 'import json; print(len(json.load(open("data-v9.json"))["matches"]))')
          DELTA=$((V9_COUNT - MAIN_COUNT))
          SIGN=""; [ $DELTA -ge 0 ] && SIGN="+"
          echo "main (v8.9): $MAIN_COUNT matches"
          echo "v9:          $V9_COUNT matches"
          echo "delta:       ${SIGN}${DELTA}"

      - name: Run summary
        run: |
          echo "=== Riepilogo run v9 ==="
          python3 - << 'PYEOF'
          import json
          d = json.load(open("data-v9.json"))
          print(f"Schema:      {d.get('$schema_version', '?')}")
          print(f"Stagione:    {d.get('season', '?')}")
          print(f"Matches:     {len(d['matches'])}")
          print(f"Standings:   {list((d.get('standings') or {}).keys())}")
          sc = (d.get("config") or {}).get("series_closed", [])
          print(f"Series chiuse: {len(sc)}")
          for s in sc:
              tag = "→ avanza" if s.get("team_advances") else "→ eliminata"
              print(f"  - {s['team_key']} vs {s['opponent']} ({s['round_name']}): {s['result']} {tag}")
          # Quick coverage check Fase 2.3
          playoff_matches = [m for m in d["matches"] if m.get("phase") == "playoff"]
          with_ext_id = sum(1 for m in playoff_matches if m.get("external_id"))
          with_periods = sum(1 for m in playoff_matches if m.get("periods"))
          print(f"Playoff coverage: {len(playoff_matches)} match, "
                f"{with_ext_id} con external_id, {with_periods} con periods")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v9-output-${{ github.run_id }}
          path: |
            data-v9.json
            data.json.legacy
          retention-days: 30
