name: Aggiorna Dati Basket Roma

on:
  schedule:
    # Run serali ogni ora dalle 19:00 alle 23:00 ora italiana
    # Coprono sia estate (UTC+2) che inverno (UTC+1)
    # usando 17:00-22:00 UTC che copre entrambe le stagioni
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
    - cron: '0 19 * * *'
    - cron: '0 20 * * *'
    - cron: '0 21 * * *'
    - cron: '0 22 * * *'
    # Run notturna alle 04:00 italiane
    # Estate (UTC+2): 02:00 UTC — Inverno (UTC+1): 03:00 UTC
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui aggiornamento dati
        run: python scripts/update_data.py

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name "Roma Basket Bot"
          git config user.email "bot@romabasket.app"
          git add data.json
          git diff --staged --quiet && echo "Nessuna modifica" || (git commit -m "🏀 Aggiornamento dati $(date +'%d/%m/%Y %H:%M')" && git push)
