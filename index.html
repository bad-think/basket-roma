<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roma Basket">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C8102E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Roma Basket Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--v:#C8102E;--l:#003087;--g:#F5C518;--bg:#0a0a0f;--card:#13131a;--bd:rgba(255,255,255,.07);--tx:#f0f0f0;--mu:#777;--gr:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overscroll-behavior:none;padding-bottom:80px}

/* Header & Status */
header{padding:16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(200,16,46,.15),transparent)}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.upbadge{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:700;text-transform:uppercase}
.upbadge.ok{background:rgba(74,222,128,.1);color:var(--gr)}
.upbadge.wait{background:rgba(245,197,24,.1);color:var(--g)}
.upbadge.err{background:rgba(200,16,46,.1);color:var(--v)}

/* Tabs */
.tabs{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto;scrollbar-width:none}
.tab{padding:8px 16px;border-radius:20px;background:var(--card);font-size:13px;font-weight:600;white-space:nowrap;color:var(--mu);border:1px solid var(--bd);transition:all .2s}
.tab.on{background:var(--tx);color:#000;border-color:var(--tx)}
.tab.tv.on{background:var(--v);color:#fff;border-color:var(--v)}
.tab.tl.on{background:var(--l);color:#fff;border-color:var(--l)}

/* Standings Small */
.stand{display:flex;gap:8px;padding:0 16px 16px}
.schip{flex:1;padding:10px;border-radius:12px;background:var(--card);border-left:3px solid var(--mu);font-size:12px}
.schip.sv{border-left-color:var(--v)}
.schip.sl{border-left-color:var(--l)}
.schip b{font-size:14px;color:#fff}

/* Hero Card */
.hero{margin:0 16px 20px;padding:20px;border-radius:24px;position:relative;overflow:hidden;background:var(--card);border:1px solid var(--bd)}
.hero.hv{background:linear-gradient(135deg,#1a1a25 0%,rgba(200,16,46,.1) 100%)}
.hero.hl{background:linear-gradient(135deg,#1a1a25 0%,rgba(0,48,135,.1) 100%)}
.hlabel{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--mu);margin-bottom:8px}
.hteam{font-family:'Bebas Neue',sans-serif;font-size:28px;margin-bottom:15px}
.hteam.hv{color:var(--v)}.hteam.hl{color:var(--l)}
.hmatch{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:700;margin-bottom:10px}
.hvs{font-size:12px;color:var(--mu);font-weight:400}
.hmeta{font-size:13px;color:var(--mu);margin-bottom:15px}
.hvenue{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.03);padding:12px;border-radius:12px}
.hvinfo{flex:1}.hvname{font-size:13px;font-weight:600}.hvaddr{font-size:11px;color:var(--mu)}
.hvmap{color:var(--tx);text-decoration:none;font-size:12px;font-weight:700;border-bottom:1px solid var(--g)}

/* Countdown */
.hcd{display:flex;gap:12px;margin-top:20px}
.cdu{text-align:center}.cdn{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}.cdl{font-size:9px;color:var(--mu);text-transform:uppercase}

/* Stats */
.stats{display:flex;gap:10px;padding:0 16px 20px}
.sti{flex:1;background:var(--card);padding:12px;border-radius:16px;text-align:center;border:1px solid var(--bd)}
.stn{font-family:'Bebas Neue',sans-serif;font-size:20px}.stl{font-size:10px;color:var(--mu)}

/* Cards */
.slbl{padding:0 16px 10px;font-size:14px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px}
.mlist{padding:0 16px;display:flex;flex-direction:column;gap:12px}
.mcard{padding:16px;border-radius:18px;background:var(--card);border:1px solid var(--bd);display:flex;flex-direction:column;gap:12px}
.mcT{display:flex;justify-content:space-between;align-items:center}
.mcbdg{font-size:10px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.05);font-weight:700}
.mcdt{font-size:12px;color:var(--mu)}
.mcmatch{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.mcsep{color:var(--mu);font-weight:400;font-size:12px}
.mcbot{display:flex;justify-content:space-between;align-items:center}
.mcrnd{font-size:11px;color:var(--mu)}
.mcres{font-family:'Bebas Neue',sans-serif;font-size:20px}
.mcres.win{color:var(--gr)}.mcres.loss{color:var(--v)}

/* Post Season */
.psblock{margin:0 16px 12px;background:var(--card);border:1px solid var(--bd);border-radius:16px;overflow:hidden}
.pshead{padding:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.pstitle{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
.psdates{font-size:11px;color:var(--mu)}
.pschev{font-size:12px;transition:transform .3s}
.psblock.open .pschev{transform:rotate(180deg)}
.psbody{display:none;padding:0 16px 16px;border-top:1px solid var(--bd)}
.psblock.open .psbody{display:block}
.psteam{margin-top:15px}.pstlbl{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-bottom:8px;display:inline-block}
.psstatus{font-weight:700;margin-bottom:4px}.psrow{font-size:13px;color:var(--mu);margin-bottom:4px}
.psbox{background:rgba(255,255,255,.03);padding:12px;border-radius:12px;margin-top:10px}
.psbtitle{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--g)}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.9);backdrop-filter:blur(15px);border-top:1px solid var(--bd);display:flex;padding:10px 16px 25px;justify-content:space-around;z-index:100}
.ibtn{background:none;border:none;color:var(--mu);font-size:20px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.ibtn.on{color:var(--v)}
.ibtn span{font-size:10px;font-weight:600}

/* Toast & Loader */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:25px;font-size:13px;font-weight:700;z-index:1000;display:none;box-shadow:0 10px 30px rgba(0,0,0,.5)}
#toast.show{display:block;animation:fadeUp .3s ease}
.spin{animation:rotate 1s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}

/* Sources */
.sources{padding:30px 16px;opacity:.5}.srctitle{font-size:10px;font-weight:700;margin-bottom:15px;letter-spacing:1px}
.srcrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px}
.srclink{color:var(--tx);text-decoration:none;border:1px solid var(--bd);padding:4px 10px;border-radius:6px}
</style>
</head>
<body>

<header>
  <div class="logo-title">🏀 Roma Basket <span id="uptime" style="font-size:10px;color:var(--mu);font-family:'DM Sans'">...</span></div>
  <div id="upbadge" class="upbadge wait">Sincronizzazione...</div>
</header>

<div class="tabs">
  <div class="tab ta on" onclick="setTab('all')">Tutte</div>
  <div class="tab tv" onclick="setTab('virtus')">Virtus Roma</div>
  <div class="tab tl" onclick="setTab('luiss')">LUISS</div>
  <div class="tab tp" onclick="setTab('post')">Post Season</div>
</div>

<div id="appContent">
  </div>

<nav class="bnav">
  <button class="ibtn on" id="homeBtn" onclick="setTab('all')">🏠<span>Home</span></button>
  <button class="ibtn" id="refreshBtn" onclick="doRefresh(true)">↻<span>Aggiorna</span></button>
  <button class="ibtn notif-off" id="notifBtn" onclick="toggleNotif()">🔔<span>Alert</span></button>
</nav>

<div id="toast"></div>

<script>
// ============================================================
// DATI DI BACKUP
// ============================================================
const MATCHES = [
  {id:'v35',team:'virtus',phase:'regular',round:35,date:'2026-04-11',time:'20:00',home:'Virtus GVM Roma',away:'Consorzio Dany Quarrata',sh:null,sa:null},
  {id:'l36',team:'luiss',phase:'regular',round:36,date:'2026-04-15',time:'15:00',home:'Luiss Roma',away:'Raggisolaris Faenza',sh:null,sa:null},
  {id:'l37',team:'luiss',phase:'regular',round:37,date:'2026-04-19',time:'18:00',home:'Luiss Roma',away:'Pielle Livorno',sh:null,sa:null},
  {id:'v38',team:'virtus',phase:'regular',round:38,date:'2026-04-26',time:'18:00',home:'Virtus GVM Roma',away:'Umana San Giobbe Chiusi',sh:null,sa:null}
];

const STANDINGS = {
  virtus:{pos:'-',pts:'-',w:'-',l:'-'},
  luiss: {pos:'-',pts:'-',w:'-',l:'-'}
};

const VENUES = {
  virtus:{name:'PalaTiziano – Palazzetto dello Sport',addr:'Piazza Apollodoro 10, Roma',maps:'https://maps.app.goo.gl/9yGZ7'},
  luiss: {name:'PalaTiziano – Palazzetto dello Sport',addr:'Piazza Apollodoro 10, Roma',maps:'https://maps.app.goo.gl/9yGZ7'}
};

const SOURCES = [
  {name:'Calendario ufficiale LNP',meta:'Serie B Nazionale Girone B',url:'https://www.legapallacanestro.com/'},
  {name:'Virtus GVM Roma 1960',meta:'Sito ufficiale squadra',url:'https://www.virtusroma1960.it'},
  {name:'LUISS Basketball',meta:'Sito ufficiale squadra',url:'https://www.luissbasket.it'}
];

// ============================================================
// STATE & UTILS
// ============================================================
let matches = JSON.parse(localStorage.getItem('brc_m')) || MATCHES;
let standings = JSON.parse(localStorage.getItem('brc_s')) || STANDINGS;
let lastUpdate = localStorage.getItem('brc_lu') || null;
let currentTab = 'all';
let notifEnabled = localStorage.getItem('brc_n') === '1';
let cdTimer = null;

const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const toDate = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
const isPast = s => toDate(s) < today();
const isToday = s => toDate(s).getTime()===today().getTime();
const fmt = s => {
  const d=toDate(s);
  const D=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const M=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  return `${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]}`;
};
const phL = p => ({regular:'Regular Season',playin:'Play-In',playoff:'Playoff'}[p]||p);

function getTeamStats(teamKey) {
  if (Array.isArray(standings)) {
    return standings.find(s => s.team === teamKey) || {pos:'-',pts:'-',w:'-',l:'-'};
  }
  return standings[teamKey] || {pos:'-',pts:'-',w:'-',l:'-'};
}

// ============================================================
// CORE FUNCTIONS
// ============================================================
function doRefresh(manual) {
  if (manual) { setBadge('wait', '⏳ ...'); document.getElementById('refreshBtn').classList.add('spin'); }
  fetch('data.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      if (data.matches) matches = data.matches;
      if (data.standings) standings = data.standings;
      
      const rawDate = data.last_updated || data.updated || new Date(); 
      lastUpdate = new Date(rawDate).toLocaleString('it-IT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
      
      localStorage.setItem('brc_m', JSON.stringify(matches));
      localStorage.setItem('brc_s', JSON.stringify(standings));
      localStorage.setItem('brc_lu', lastUpdate);
      
      setBadge('ok', '✅ Live');
      if (manual) showToast('✅ Dati aggiornati');
      render();
    })
    .catch(e => {
      console.error(e);
      setBadge('err', '⚠️ Errore');
    })
    .finally(() => {
      document.getElementById('refreshBtn').classList.remove('spin');
      document.getElementById('uptime').textContent = lastUpdate ? 'Agg: ' + lastUpdate : '—';
    });
}

function render() {
  const c = document.getElementById('appContent');
  if (!c) return;
  if (currentTab === 'post') { c.innerHTML = renderPost(); return; }

  const filtered = matches.filter(m => currentTab==='all' || m.team===currentTab)
    .sort((a,b)=>a.date.localeCompare(b.date));
  const upcoming = filtered.filter(m=>!isPast(m.date)||isToday(m.date));
  const past     = filtered.filter(m=>isPast(m.date)&&!isToday(m.date));

  let html = renderStandings();
  if (upcoming.length) html += renderHero(upcoming[0]);
  if (currentTab==='all') html += renderStats();

  if (upcoming.length) {
    html += `<div class="slbl">Prossime partite in casa</div><div class="mlist">`;
    upcoming.forEach((m,i) => { html += renderCard(m,i); });
    html += `</div>`;
  }
  if (past.length) {
    html += `<div class="slbl">Partite giocate</div><div class="mlist">`;
    [...past].reverse().forEach((m,i) => { html += renderCard(m,i+upcoming.length); });
    html += `</div>`;
  }
  html += renderSources();
  c.innerHTML = html;
  startCD(upcoming[0]);
}

function renderStandings() {
  const v = getTeamStats('virtus');
  const l = getTeamStats('luiss');
  return `<div class="stand">
    <div class="schip sv"><b>${v.pos}°</b> Virtus Roma — ${v.pts}pt (${v.w}V-${v.l}P)</div>
    <div class="schip sl"><b>${l.pos}°</b> LUISS Roma — ${l.pts}pt (${l.w}V-${l.l}P)</div>
  </div>`;
}

function renderHero(m) {
  const tn = m.team==='virtus'?'Virtus GVM Roma':'LUISS Roma';
  const tc = m.team==='virtus'?'hv':'hl';
  const v  = VENUES[m.team];
  const tod = isToday(m.date) ? '<span style="background:var(--g);color:#000;font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:8px">OGGI</span>' : '';
  return `<div class="hero ${tc}">
    <div class="hlabel">PROSSIMA PARTITA IN CASA</div>
    <div class="hteam ${tc}">${tn.toUpperCase()}</div>
    <div class="hbody">
      <div class="hmatch"><span class="hhome">${m.home}</span><span class="hvs">vs</span><span class="haway">${m.away}</span></div>
      <div class="hmeta">📅 ${fmt(m.date)} · ore ${m.time||'TBD'} ${tod}</div>
      <div class="hvenue">
        <span>📍</span>
        <div class="hvinfo"><div class="hvname">${v.name}</div><div class="hvaddr">${v.addr}</div></div>
        <a class="hvmap" href="${v.maps}" target="_blank">Mappa</a>
      </div>
      <div class="hcd" id="heroCD"></div>
    </div>
  </div>`;
}

function startCD(m) {
  if (cdTimer) clearInterval(cdTimer);
  if (!m) return;
  const tick = () => {
    const el = document.getElementById('heroCD');
    if (!el) return;
    const [hh,mm] = (m.time||'20:30').split(':').map(Number);
    const t = toDate(m.date); t.setHours(hh,mm,0,0);
    const diff = t - new Date();
    if (diff <= 0) { el.innerHTML = `<div class="cdu"><div class="cdn" style="color:var(--g)">LIVE 🏀</div></div>`; return; }
    const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), mn=Math.floor((diff%3600000)/60000);
    el.innerHTML = `<div class="cdu"><div class="cdn">${d}</div><div class="cdl">giorni</div></div><div class="cdu"><div class="cdn">${h}</div><div class="cdl">ore</div></div><div class="cdu"><div class="cdn">${mn}</div><div class="cdl">min</div></div>`;
  };
  tick(); cdTimer = setInterval(tick, 30000);
}

function renderStats() {
  const wins = arr => arr.filter(m=>m.sh!=null&&m.sh>m.sa).length;
  const vA = matches.filter(m=>m.team==='virtus'&&isPast(m.date)&&m.sh!=null);
  const lA = matches.filter(m=>m.team==='luiss' &&isPast(m.date)&&m.sh!=null);
  const rem = matches.filter(m=>!isPast(m.date)).length;
  return `<div class="stats">
    <div class="sti"><div class="stn sv">${wins(vA)}/${vA.length}</div><div class="stl">Virtus Casa</div></div>
    <div class="sti"><div class="stn sl">${wins(lA)}/${lA.length}</div><div class="stl">LUISS Casa</div></div>
    <div class="sti"><div class="stn">${rem}</div><div class="stl">Rimanenti</div></div>
  </div>`;
}

function renderCard(m, idx) {
  const tc = m.team==='virtus'?'cv':'cl';
  const tl = m.team==='virtus'?'Virtus Roma':'LUISS Roma';
  const res = (m.sh!=null) ? `<span class="mcres ${m.sh>m.sa?'win':'loss'}">${m.sh}–${m.sa}</span>` : `<span class="mcres tbd">—</span>`;
  const anim = `animation:fadeUp .3s ease ${Math.min(idx*.04,.3)}s both`;
  return `<div class="mcard ${tc}" style="${anim}">
    <div class="mcT">
      <span class="mcbdg">${tl}</span>
      <div style="display:flex;gap:6px;align-items:center">
        ${!isPast(m.date)?'<span class="mctm">⏰ '+m.time+'</span>':''}
        <span class="mcdt">${fmt(m.date)}</span>
      </div>
    </div>
    <div class="mcmatch"><span class="mchome">${m.home}</span><span class="mcsep">vs</span><span class="mcaway">${m.away}</span></div>
    <div class="mcbot"><span class="mcrnd">G${m.round||phL(m.phase)}</span>${res}</div>
  </div>`;
}

function renderPost() {
  const vStats = getTeamStats('virtus');
  const lStats = getTeamStats('luiss');

  const teamBlock = (team, stats) => {
    const pos = parseInt(stats.pos) || 20;
    const isQual = pos <= 6;
    const tl = team==='virtus'?'Virtus GVM Roma':'LUISS Roma';
    const tc = team==='virtus'?'sv':'sl';
    return `<div class="psteam">
      <span class="pstlbl ${tc}">${tl}</span>
      <div class="psstatus ${isQual?'q':'r'}">${isQual?'✅ Playoff diretto':'⚠️ Play-In'}</div>
      <div class="psrow">📊 <em>${stats.pos}° posto</em> — ${stats.pts}pt (${stats.w}V-${stats.l}P)</div>
    </div>`;
  };

  return `<div style="padding-bottom:100px">
    <div class="slbl" style="font-size:18px; padding-top:20px">Post Season 2025-26</div>
    <div class="psblock playoff open">
      <div class="pshead" onclick="this.parentElement.classList.toggle('open')">
        <div><div class="pstitle">Playoff & Situazione</div><div class="psdates">8 mag – 21 giu 2026</div></div>
        <span class="pschev">▼</span>
      </div>
      <div class="psbody">
        ${teamBlock('virtus', vStats)}
        <div style="height:1px;background:var(--bd);margin:15px 0"></div>
        ${teamBlock('luiss', lStats)}
      </div>
    </div>
    <div class="psblock info">
      <div class="pshead" onclick="this.parentElement.classList.toggle('open')">
        <div class="pstitle">📖 Formula Serie B</div>
        <span class="pschev">▼</span>
      </div>
      <div class="psbody">
        <div class="psrow">Le prime 6 di ogni girone accedono direttamente ai Playoff.</div>
        <div class="psrow">Dalla 7ª alla 12ª disputano i Play-In per gli ultimi 2 posti.</div>
      </div>
    </div>
    ${renderSources()}
  </div>`;
}

function renderSources() {
  const rows = SOURCES.map(s => `<div class="srcrow">
    <div><div class="srcname">${s.name}</div><div class="srcmeta">${s.meta}</div></div>
    <a class="srclink" href="${s.url}" target="_blank">Apri</a>
  </div>`).join('');
  return `<div class="sources"><div class="srctitle">FONTI DATI</div>${rows}</div>`;
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  const map = {all:'ta',virtus:'tv',luiss:'tl',post:'tp'};
  document.querySelector('.tab.'+map[t]).classList.add('on');
  render();
}

function setBadge(type, text) {
  const el = document.getElementById('upbadge');
  if (el) { el.className = 'upbadge ' + type; el.textContent = text; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (btn) btn.className = notifEnabled ? 'ibtn on' : 'ibtn notif-off';
}

async function toggleNotif() {
  if (!('Notification' in window)) { showToast('⚠️ Notifiche non supportate'); return; }
  if (notifEnabled) {
    notifEnabled = false; localStorage.setItem('brc_n','0');
    updateNotifBtn(); showToast('🔕 Alert disattivati'); return;
  }
  const p = await Notification.requestPermission();
  if (p==='granted') { notifEnabled=true; localStorage.setItem('brc_n','1'); updateNotifBtn(); showToast('✅ Alert attivati'); }
}

// Avvio
document.getElementById('uptime').textContent = lastUpdate ? 'Agg: '+lastUpdate : '—';
updateNotifBtn();
render();
setTimeout(()=>doRefresh(false), 1000);

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
