<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roma Basket">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E8112D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Roma Basket Casa — Roma Basket Sport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FFF6D8;
  --cream-dk:#E8DDA8;
  --black:#0D0D0F;
  --yellow:#FFD400;
  --red:#E8112D;
  --blue:#1E3A8A;
  --green:#2ECC40;
  --mu:#666;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--cream);color:var(--black);font-family:'Barlow Condensed',Impact,sans-serif;min-height:100vh;font-size:16px;-webkit-font-smoothing:antialiased}
body{position:relative;overflow-x:hidden}

/* CRT scanlines globali — molto sottili */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:200;
  background:repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0,0,0,0.035) 2px, rgba(0,0,0,0.035) 3px);
  mix-blend-mode:multiply;
}

/* ZIGZAG TOP */
.zigzag{
  height:14px;
  background:
    linear-gradient(135deg,#000 25%,transparent 25%) -7px 0,
    linear-gradient(225deg,#000 25%,transparent 25%) -7px 0,
    linear-gradient(315deg,#000 25%,transparent 25%),
    linear-gradient(45deg,#000 25%,transparent 25%);
  background-size:14px 14px;
  background-color:var(--yellow);
  border-bottom:2px solid var(--black);
}

/* HEADER */
header{
  background:var(--black);
  position:sticky; top:0; z-index:50;
  border-bottom:3px solid var(--yellow);
}
.hrow{display:flex;align-items:center;gap:10px;padding:10px 14px}
.brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.brand-mark{
  font-family:'Archivo Black',Impact,sans-serif;
  font-size:22px;line-height:1;letter-spacing:-1.2px;
  color:var(--yellow);
  background:var(--red);
  padding:5px 7px;
  border:2px solid var(--yellow);
  transform:skewX(-8deg);
  box-shadow:3px 3px 0 var(--yellow);
  flex-shrink:0;
}
.brand-lines{line-height:1.05;min-width:0;overflow:hidden}
.brand-name{
  font-family:'Archivo Black',Impact,sans-serif;
  font-size:15px;color:var(--yellow);letter-spacing:.5px;
  white-space:nowrap;
}
.brand-sub{
  font-size:9px;color:#fff;letter-spacing:2px;margin-top:3px;font-weight:700;
  white-space:nowrap;
}
.ibtn{
  background:var(--yellow);border:2px solid var(--yellow);color:var(--black);
  padding:6px 9px;cursor:pointer;font-size:14px;line-height:1;
  font-family:'Archivo Black',sans-serif;font-weight:900;
  box-shadow:2px 2px 0 var(--red);
  transition:transform .1s;
  display:flex;align-items:center;gap:5px;
}
.ibtn:active{transform:translate(2px,2px);box-shadow:none}
.ibtn.notif-off{position:relative;background:var(--cream);color:#666}
.ibtn.notif-off::after{
  content:'';position:absolute;top:3px;right:4px;width:7px;height:7px;
  background:var(--red);border-radius:50%;border:1.5px solid var(--cream);
}
.ibtn.on{background:var(--green);color:var(--black);box-shadow:2px 2px 0 var(--black)}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin:active{transform:rotate(0)}

.onair-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 14px 8px;
  font-family:'Archivo Black',sans-serif;
}
.uptime{font-size:10px;color:#aaa;letter-spacing:1.5px;font-weight:700}
.upbadge{
  font-family:'Archivo Black',sans-serif;
  font-size:10px;letter-spacing:1.5px;
  padding:3px 8px;border:2px solid var(--yellow);
  display:flex;align-items:center;gap:5px;
}
.upbadge.ok{background:var(--red);color:#fff;box-shadow:2px 2px 0 var(--yellow)}
.upbadge.err{background:#000;color:#ff6b6b;border-color:#ff6b6b}
.upbadge.wait{background:#222;color:var(--yellow)}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--yellow);
  animation:pulse2 1.2s infinite;
}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}

/* TICKER */
.ticker-wrap{
  display:flex;background:var(--black);
  border-bottom:2px solid var(--yellow);
  height:30px;align-items:center;
}
.ticker-lbl{
  background:var(--yellow);color:var(--black);
  font-family:'Archivo Black',sans-serif;
  font-size:10px;letter-spacing:1.5px;
  padding:0 10px;align-self:stretch;
  display:flex;align-items:center;
  border-right:2px solid var(--black);
}
.ticker-body{flex:1;overflow:hidden;display:flex;align-items:center}
.ticker-text{
  white-space:nowrap;color:var(--yellow);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:700;
  padding-left:12px;letter-spacing:.5px;
  will-change:transform;
}

/* TABS */
.tabs{
  display:flex;gap:5px;
  padding:10px 12px 10px;
  background:var(--cream);
  border-bottom:2px solid var(--black);
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:78px;
  font-family:'Archivo Black',Impact,sans-serif;
  font-size:11px;letter-spacing:1px;
  padding:8px 6px;
  border:2px solid var(--black);
  cursor:pointer;
  background:var(--cream);color:var(--black);
  box-shadow:2px 2px 0 var(--black);
  transition:transform .1s;
  display:flex;align-items:center;justify-content:center;gap:4px;
  text-transform:uppercase;
  white-space:nowrap;
}
.tab:active{transform:translate(2px,2px);box-shadow:none}
.tab.on.ta{background:var(--black);color:var(--yellow);box-shadow:3px 3px 0 var(--red)}
.tab.on.tv{background:var(--red);color:var(--yellow);box-shadow:3px 3px 0 var(--black)}
.tab.on.tl{background:var(--blue);color:var(--yellow);box-shadow:3px 3px 0 var(--black)}
.tab.on.tp{background:var(--yellow);color:var(--black);box-shadow:3px 3px 0 var(--red)}
.tab-crest{
  background:var(--cream);padding:1px 3px;
  border:1px solid rgba(0,0,0,.5);
  display:inline-flex;align-items:center;
}
.tab-crest img{height:14px;display:block}

/* STANDINGS */
.stand{
  display:flex;gap:8px;padding:14px 14px 0;
  overflow-x:auto;scrollbar-width:none;
}
.stand::-webkit-scrollbar{display:none}
.schip{
  flex-shrink:0;
  font-family:'Archivo Black',sans-serif;
  font-size:11px;letter-spacing:1px;
  padding:8px 12px;
  border:2px solid var(--black);
  box-shadow:3px 3px 0 var(--black);
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;color:#fff;
}
.schip.sv{background:var(--red)}
.schip.sl{background:var(--blue)}
.schip.slink{
  background:var(--yellow);color:var(--black);
  text-decoration:none;
  box-shadow:3px 3px 0 var(--red);
}
.schip-rank{
  font-family:'Archivo Black',sans-serif;font-size:18px;line-height:1;
  background:var(--yellow);color:var(--black);
  padding:1px 5px;border:1.5px solid var(--black);
}
.schip-meta{font-size:10px;font-weight:700;opacity:.9}
.schip-crest{background:#fff;padding:2px 4px;border:1.5px solid var(--black);display:flex}
.schip-crest img{height:18px;display:block}

/* SECTION LABEL */
.slbl{
  font-family:'Archivo Black',sans-serif;
  font-size:13px;letter-spacing:2.5px;
  color:var(--black);
  background:var(--yellow);
  padding:5px 10px;
  margin:18px 14px 10px;
  border:2px solid var(--black);
  box-shadow:3px 3px 0 var(--red);
  display:inline-block;
  transform:skewX(-8deg);
}

/* HERO SCOREBOARD */
.scoreboard{
  margin:14px 14px 0;
  background:var(--cream);
  border:4px solid var(--black);
  box-shadow:6px 6px 0 var(--black);
  position:relative;overflow:hidden;
}
.sb-topbar{
  color:var(--yellow);
  padding:7px 12px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Archivo Black',sans-serif;
  font-size:10px;letter-spacing:1.5px;
  border-bottom:2px solid var(--black);
}
.sb-topbar.tv{background:var(--red)}
.sb-topbar.tl{background:var(--blue)}
.sb-live{display:flex;align-items:center;gap:6px}
.sb-halftone{
  position:absolute;left:0;right:0;top:32px;bottom:32px;
  background-image:radial-gradient(circle, rgba(0,0,0,0.18) 1px, transparent 1.5px);
  background-size:7px 7px;pointer-events:none;
}
.sb-crest-bg{
  position:absolute;right:-50px;top:40px;
  opacity:.18;transform:rotate(-12deg);pointer-events:none;
}
.sb-crest-bg img{height:200px;display:block}
.sb-body{padding:14px 14px 10px;position:relative;z-index:2}
.sb-row{display:flex;align-items:center;gap:10px}
.sb-crest{
  flex-shrink:0;background:#fff;
  padding:5px 7px;border:2px solid var(--black);
  box-shadow:2px 2px 0 var(--red);
  display:flex;align-items:center;justify-content:center;
}
.sb-row.tl .sb-crest{box-shadow:2px 2px 0 var(--blue)}
.sb-crest img{height:36px;display:block}
.sb-team-name{
  flex:1;min-width:0;
  font-family:'Archivo Black',sans-serif;
  font-size:18px;letter-spacing:-.5px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.sb-badge{
  color:var(--yellow);
  padding:3px 7px;
  font-size:9px;letter-spacing:1.5px;font-weight:900;
  font-family:'Archivo Black',sans-serif;
  border:2px solid var(--black);
  box-shadow:2px 2px 0 var(--black);
}
.sb-badge.home.tv{background:var(--red)}
.sb-badge.home.tl{background:var(--blue)}
.sb-badge.away{background:#fff;color:var(--black)}
.sb-vs-row{display:flex;align-items:center;gap:8px;margin:10px 0}
.sb-vs-line{flex:1;height:3px;background:var(--black)}
.sb-vs{
  font-family:'Archivo Black',sans-serif;
  font-size:24px;color:var(--black);
  background:var(--yellow);
  padding:2px 12px;
  border:2px solid var(--black);
  letter-spacing:-1px;
  transform:skewX(-8deg);
}
.sb-away-box{
  flex-shrink:0;width:48px;height:36px;
  background:#fff;border:2px solid var(--black);
  box-shadow:2px 2px 0 var(--blue);
  display:flex;align-items:center;justify-content:center;
  font-family:'Archivo Black',sans-serif;font-size:22px;color:#999;
}
.sb-meta-row{
  display:flex;align-items:center;gap:8px;
  margin-top:10px;font-size:11px;font-weight:700;letter-spacing:.5px;
  color:#333;
}
.sb-meta-row b{color:var(--black);font-weight:900}
.sb-tag{
  background:var(--green);color:var(--black);
  font-family:'Archivo Black',sans-serif;
  font-size:9px;letter-spacing:1.5px;
  padding:2px 6px;
  border:2px solid var(--black);
  box-shadow:2px 2px 0 var(--black);
}

/* VENUE BOX */
.sb-venue{
  display:flex;align-items:center;gap:10px;
  background:var(--cream-dk);
  border:2px solid var(--black);
  padding:9px 11px;margin-top:12px;
}
.sb-venue-info{flex:1;min-width:0}
.sb-venue-name{
  font-family:'Archivo Black',sans-serif;
  font-size:12px;color:var(--black);letter-spacing:.3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.sb-venue-addr{font-size:10px;color:#555;font-weight:600;margin-top:1px}
.sb-map-btn{
  background:var(--black);color:var(--yellow);
  font-family:'Archivo Black',sans-serif;
  font-size:10px;letter-spacing:1.5px;
  padding:5px 9px;
  border:2px solid var(--black);
  text-decoration:none;
  box-shadow:2px 2px 0 var(--red);
  flex-shrink:0;
}

/* COUNTDOWN LOWER-THIRD */
.lower-third{
  margin:4px -14px -10px;
  background:var(--black);color:var(--yellow);
  padding:10px 14px;
  border-top:3px solid var(--yellow);
}
.lt-label{
  font-family:'Archivo Black',sans-serif;
  font-size:10px;letter-spacing:2px;color:var(--yellow);
  margin-bottom:7px;
}
.lt-cd{display:flex;align-items:flex-end;gap:6px;justify-content:center}
.lt-block{
  background:var(--yellow);color:var(--black);
  padding:5px 9px;border:2px solid var(--yellow);
  min-width:54px;text-align:center;
  box-shadow:2px 2px 0 var(--red);
}
.lt-num{
  font-family:'Archivo Black',sans-serif;
  font-size:26px;line-height:1;letter-spacing:-1px;
}
.lt-lbl{font-size:9px;letter-spacing:1.5px;font-weight:700;margin-top:2px}
.lt-sep{
  color:var(--yellow);font-family:'Archivo Black',sans-serif;
  font-size:24px;line-height:1;padding-bottom:8px;
}
.lt-live{
  text-align:center;
  font-family:'Archivo Black',sans-serif;
  font-size:24px;color:var(--red);
  background:var(--yellow);
  padding:8px;letter-spacing:2px;
  border:2px solid var(--yellow);
  animation:pulse2 1.4s infinite;
}

.sb-bottom{
  color:var(--yellow);
  padding:6px 12px;
  display:flex;justify-content:space-between;
  font-family:'Archivo Black',sans-serif;
  font-size:9px;letter-spacing:2px;
  border-top:2px solid var(--black);
}
.sb-bottom.tv{background:var(--red)}
.sb-bottom.tl{background:var(--blue)}

/* STATS RECAP */
.stats-row{
  display:flex;margin:14px 14px 0;
  border:3px solid var(--black);
  box-shadow:4px 4px 0 var(--black);
  background:var(--cream);
}
.sti{
  flex:1;padding:10px 6px;text-align:center;
  border-right:2px solid var(--black);
  position:relative;
}
.sti:last-child{border-right:none}
.stn{
  font-family:'Archivo Black',sans-serif;
  font-size:22px;line-height:1;letter-spacing:-1px;
}
.stn.sv{color:var(--red);text-shadow:2px 2px 0 var(--yellow)}
.stn.sl{color:var(--blue);text-shadow:2px 2px 0 var(--yellow)}
.stn.sn{color:var(--black);text-shadow:2px 2px 0 var(--yellow)}
.stl{
  font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;font-weight:900;color:var(--black);
  margin-top:3px;
  font-family:'Archivo Black',sans-serif;
}

/* GAME CARDS */
.mlist{padding:0 14px 16px}
.gcard{
  background:var(--cream);
  border:2px solid var(--black);
  border-left-width:6px;
  box-shadow:3px 3px 0 var(--black);
  margin-bottom:10px;
  position:relative;
}
.gcard.cv{border-left-color:var(--red)}
.gcard.cl{border-left-color:var(--blue)}
.gcard.cp{border-left-color:var(--yellow)}
.gc-top{
  color:var(--yellow);
  padding:4px 10px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Archivo Black',sans-serif;
  font-size:10px;letter-spacing:1.5px;
}
.gc-top.cv{background:var(--red)}
.gc-top.cl{background:var(--blue)}
.gc-top.cp{background:var(--black)}
.gc-top .gc-time{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:10px}
.gc-body{padding:9px 10px 10px;display:flex;align-items:center;gap:10px}
.gc-crest{
  flex-shrink:0;background:#fff;
  padding:4px 6px;border:2px solid var(--black);
  box-shadow:2px 2px 0 var(--black);
  min-width:48px;min-height:38px;
  display:flex;align-items:center;justify-content:center;
}
.gc-crest img{height:30px;display:block}
.gc-info{flex:1;min-width:0}
.gc-home{
  font-family:'Archivo Black',sans-serif;
  font-size:13px;letter-spacing:-.3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.gc-home.cv{color:var(--red)}
.gc-home.cl{color:var(--blue)}
.gc-home.cp{color:var(--black)}
.gc-vs{
  font-size:11px;color:#444;font-weight:700;letter-spacing:.5px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  margin-top:1px;
}
.gc-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.gc-chip{
  background:var(--black);color:var(--yellow);
  padding:3px 7px;
  font-family:'Archivo Black',sans-serif;
  font-size:9px;letter-spacing:1.5px;
  border:2px solid var(--yellow);
  display:flex;align-items:center;gap:4px;
}
.gc-chip-dot{
  width:5px;height:5px;border-radius:50%;background:var(--yellow);
  animation:pulse2 1.4s infinite;
}
.gc-today{background:var(--green);color:var(--black);border-color:var(--black)}
.gc-today .gc-chip-dot{background:var(--black)}
.gc-tbd{
  background:var(--cream-dk);color:#999;
  padding:3px 7px;
  font-family:'Archivo Black',sans-serif;
  font-size:11px;letter-spacing:1px;
  border:2px solid var(--black);
}
.gc-score{
  font-family:'Archivo Black',sans-serif;
  font-size:18px;letter-spacing:-.5px;
  background:var(--black);color:var(--yellow);
  padding:3px 8px;
  border:2px solid var(--black);
  box-shadow:2px 2px 0 var(--yellow);
  display:flex;gap:4px;align-items:center;
}
.gc-score-h.win{color:var(--green)}
.gc-score-h.loss{color:#ff6b6b}
.gc-score-dash{color:#888}
.gc-wl{
  font-family:'Archivo Black',sans-serif;
  font-size:14px;line-height:1;
  width:24px;height:26px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--black);
  box-shadow:2px 2px 0 var(--black);
}
.gc-wl.w{background:var(--yellow);color:var(--black)}
.gc-wl.l{background:#222;color:var(--yellow)}

.gc-venue{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;
  border-top:2px dashed var(--black);
  background:var(--cream-dk);
}
.gc-venue-info{flex:1;min-width:0;font-size:10px;line-height:1.4}
.gc-venue-info b{
  display:block;font-family:'Archivo Black',sans-serif;
  font-size:11px;color:var(--black);letter-spacing:.2px;
}
.gc-venue-addr{color:#555;font-weight:600}
.gc-venue-map{
  background:var(--black);color:var(--yellow);
  font-family:'Archivo Black',sans-serif;
  font-size:9px;letter-spacing:1.5px;
  padding:4px 8px;
  border:2px solid var(--black);
  text-decoration:none;
  box-shadow:2px 2px 0 var(--red);
  flex-shrink:0;
}

/* SEASON BANNER */
.sbnr{
  margin:14px 14px 0;
  background:var(--cream);
  border:3px solid var(--black);
  box-shadow:5px 5px 0 var(--black);
  overflow:hidden;
}
.sbnr-top{
  padding:6px 11px;color:var(--yellow);
  font-family:'Archivo Black',sans-serif;
  font-size:10px;letter-spacing:2px;
  display:flex;align-items:center;gap:8px;
  border-bottom:2px solid var(--black);
}
.sbnr.sb-action .sbnr-top{background:var(--red)}
.sbnr.sb-warning .sbnr-top{background:var(--blue)}
.sbnr.sb-done .sbnr-top{background:#1a7a2e}
.sbnr.sb-new .sbnr-top{background:var(--black)}
.sbnr-body{padding:12px 14px 14px}
.sbnr-title{
  font-family:'Archivo Black',sans-serif;
  font-size:18px;letter-spacing:-.3px;line-height:1.1;
  margin-bottom:7px;
}
.sbnr.sb-action .sbnr-title{color:var(--red)}
.sbnr.sb-warning .sbnr-title{color:var(--blue)}
.sbnr.sb-done .sbnr-title{color:#1a7a2e}
.sbnr.sb-new .sbnr-title{color:var(--black)}
.sbnr-text{
  font-size:13px;color:#333;line-height:1.5;
  font-weight:500;
}
.sbnr-text em{color:var(--black);font-style:normal;font-weight:900;font-family:'Archivo Black',sans-serif;font-size:12px}
.sbnr-text code{
  font-family:'JetBrains Mono',monospace;
  background:var(--black);color:var(--yellow);
  padding:1px 5px;font-size:11px;font-weight:700;
}
.sbnr-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
.sb-btn{
  background:var(--black);color:var(--yellow);
  font-family:'Archivo Black',sans-serif;
  font-size:10px;letter-spacing:1.5px;
  padding:6px 11px;
  border:2px solid var(--black);
  text-decoration:none;
  box-shadow:2px 2px 0 var(--yellow);
}

</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <div class="zigzag"></div>
  <div class="hrow">
    <div class="brand">
      <div class="brand-mark">RB</div>
      <div class="brand-lines">
        <div class="brand-name">ROMA BASKET SPORT</div>
        <div class="brand-sub" id="brandSeason">—</div>
      </div>
    </div>
    <button class="ibtn" id="refreshBtn" onclick="doRefresh(true)" title="Aggiorna">↻</button>
    <button class="ibtn" id="notifBtn" onclick="toggleNotif()" title="Notifiche">🔔</button>
  </div>
  <div class="onair-row">
    <span class="uptime" id="uptime">—</span>
    <span class="upbadge wait" id="upbadge"><span class="live-dot"></span>WAIT</span>
  </div>
  <div class="ticker-wrap">
    <div class="ticker-lbl">★ RISULTATI ★</div>
    <div class="ticker-body"><div class="ticker-text" id="tickerText">CARICAMENTO…</div></div>
  </div>
  <div class="tabs">
    <button class="tab ta on"  onclick="setTab('all')">TUTTE</button>
    <button class="tab tv"     onclick="setTab('virtus')">
      <span class="tab-crest"><img src="assets/virtus-roma.png" alt=""/></span>VIRTUS
    </button>
    <button class="tab tl"     onclick="setTab('luiss')">
      <span class="tab-crest"><img src="assets/luiss-roma.png" alt=""/></span>LUISS
    </button>
    <button class="tab tp"     onclick="setTab('post')">PLAYOFF</button>
  </div>
</header>

<div id="appContent"></div>

<script>
// ============================================================
// DATI
// ============================================================
const MATCHES = [];

const STANDINGS = {
  virtus:{pos:1,pts:54,w:27,l:7},
  luiss: {pos:6,pts:40,w:20,l:14}
};

const VENUES = {
  virtus:{name:'PalaTiziano – Palazzetto dello Sport',addr:'Piazza Apollodoro 10, Roma',maps:'https://maps.google.com/?q=Palazzetto+dello+Sport+Piazza+Apollodoro+10+Roma'},
  luiss: {name:'PalaTiziano – Palazzetto dello Sport',addr:'Piazza Apollodoro 10, Roma',maps:'https://maps.google.com/?q=Palazzetto+dello+Sport+Piazza+Apollodoro+10+Roma'}
};

const SOURCES = [
  {name:'Calendario ufficiale LNP',meta:'PDF Girone B 2025-26',url:'https://static.legapallacanestro.com/sites/default/files/editor/calendario_b_nazionale_gir._b_2025-26.pdf'},
  {name:'Formula campionato LNP',meta:'Serie B Nazionale 2025-26',url:'https://www.legapallacanestro.com/formula-serie-b-nazionale-2025-26'},
  {name:'Risultati e classifiche',meta:'pianetabasket.com — Girone B',url:'https://www.pianetabasket.com/serie-b/'},
  {name:'Virtus GVM Roma 1960',meta:'Sito ufficiale squadra',url:'https://www.virtusroma1960.it'},
  {name:'LUISS Basketball',meta:'Sito ufficiale squadra',url:'https://www.luissbasket.it'},
];

const TEAM_LOGO = {
  virtus: 'assets/virtus-roma.png',
  luiss:  'assets/luiss-roma.png'
};
const TEAM_LABEL = {
  virtus: 'Virtus GVM Roma',
  luiss:  'LUISS Roma'
};

// ============================================================
// STATE - SISTEMA ANTI-CANCELLAZIONE PARTITE
// ============================================================
let matches = MATCHES.map(m=>({...m}));
let savedMatches = JSON.parse(localStorage.getItem('brc_m') || 'null');

if (savedMatches && Array.isArray(savedMatches)) {
  savedMatches.forEach(sm => {
    const t = matches.find(m => m.id === sm.id || (m.team === sm.team && m.round === sm.round));
    if (t) {
      if (sm.sh !== undefined && sm.sh !== null) t.sh = sm.sh;
      if (sm.sa !== undefined && sm.sa !== null) t.sa = sm.sa;
      if (sm.date) t.date = sm.date;
      if (sm.time) t.time = sm.time;
    }
    // Partite NUOVE non presenti nel calendario base (es. playoff aggiunte da data.json)
    else if (sm.id && sm.team && sm.date) {
      matches.push({...sm});
    }
  });
}

let standings = JSON.parse(localStorage.getItem('brc_s') || 'null') || {...STANDINGS};
let lastUpdate = localStorage.getItem('brc_lu') || null;
let classificaUrl = localStorage.getItem('brc_cu') || null;
let currentTab = 'all';
let notifEnabled = localStorage.getItem('brc_n') === '1';
let cdTimer = null;
let tickerRaf = null;
let refreshing = false;

// ============================================================
// UTILS
// ============================================================
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const toDate = s => {
  if (!s) return new Date(0);
  if (s.includes('/')) { const [d,m,y]=s.split('/'); return new Date(y,m-1,d); }
  const [y,m,d] = s.split('T')[0].split('-').map(Number); return new Date(y,m-1,d);
};
const isPast = s => toDate(s) < today();
const isToday = s => toDate(s).getTime()===today().getTime();
const fmt = s => {
  const d=toDate(s);
  const D=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const M=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  return `${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
};
const fmtUpper = s => fmt(s).toUpperCase();
const phL = p => ({regular:'Regular Season',playin:'Play-In',playoff:'Playoff',playout:'Playout'}[p]||p);
const phShort = p => ({regular:'REG',playin:'PLAY-IN',playoff:'PLAYOFF',playout:'PLAYOUT'}[p]||p.toUpperCase());

function getTeamStats(teamKey) {
  let s = null;
  if (Array.isArray(standings)) s = standings.find(x => x.team === teamKey || x.nome === teamKey);
  else if (standings) s = standings[teamKey];

  if (!s) return {pos:'-',pts:'-',w:'-',l:'-'};

  const getV = (...keys) => {
    for(let k of keys) if(s[k] !== undefined && s[k] !== null) return s[k];
    return '-';
  };
  return {
    pos: getV('pos','posizione','position'),
    pts: getV('pts','punti','points'),
    w: getV('w','vittorie','wins'),
    l: getV('l','sconfitte','losses')
  };
}

function escHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function teamInitials(name){
  if (!name) return '?';
  const skip = new Set(['basket','assicurazioni','consorzio','leonardo','dany','golfo','cbd','gvm','psa','malvin','solbat','up','old','wild','west']);
  const words = name.split(/\s+/).filter(w => w.length >= 2 && !skip.has(w.toLowerCase()));
  if (!words.length) return name.charAt(0).toUpperCase();
  if (words.length === 1) return words[0].substring(0,3).toUpperCase();
  return words.slice(-2).map(w => w.charAt(0)).join('').toUpperCase();
}

// Calcola etichetta stagione (es. "'25/'26") dai dati partite — auto-aggiornante
function getCurrentSeasonLabel() {
  const all = matches.length ? matches : MATCHES;
  if (!all.length) {
    // Fallback: stagione di basket = settembre→giugno
    const now = new Date();
    const startYr = now.getMonth() >= 7 ? now.getFullYear() : now.getFullYear()-1;
    return `'${String(startYr).slice(2)}/'${String(startYr+1).slice(2)}`;
  }
  const years = all.map(m => toDate(m.date).getFullYear());
  const minY = Math.min(...years);
  const maxY = Math.max(...years);
  if (minY === maxY) return `'${String(minY).slice(2)}`;
  return `'${String(minY).slice(2)}/'${String(maxY).slice(2)}`;
}

function updateSeasonLabels() {
  const lbl = getCurrentSeasonLabel();
  const a = document.getElementById('brandSeason');
  const b = document.getElementById('footerSeason');
  if (a) a.textContent = `STAGIONE ${lbl}`;
  if (b) b.textContent = `STAGIONE ${lbl} · BROADCAST`;
}

// ============================================================
// FETCH data.json
// ============================================================
function doRefresh(manual) {
  if (refreshing) return;
  refreshing = true;
  if (manual) {
    setBadge('wait','<span class="live-dot"></span>SYNC');
    document.getElementById('refreshBtn').classList.add('spin');
  }
  fetch('data.json?v=' + Date.now(), {cache:'no-store'})
    .then(r => r.ok ? r.json() : Promise.reject('404'))
    .then(data => {
      if (data.matches && data.matches.length) {
        // Sostituzione completa: data.json è la fonte autoritativa
        matches = data.matches.map(dm => ({
          id: dm.id, team: dm.team, phase: dm.phase || 'regular',
          round: dm.round, date: dm.date, time: dm.time,
          home: dm.home, away: dm.away, sh: dm.sh, sa: dm.sa
        }));
        localStorage.setItem('brc_m', JSON.stringify(matches));
      }
      if (data.standings) {
        standings = data.standings;
        localStorage.setItem('brc_s', JSON.stringify(standings));
      }
      if (data.config && data.config.classifica_url) {
        classificaUrl = data.config.classifica_url;
        localStorage.setItem('brc_cu', classificaUrl);
      }
      // Supporto a campionati separati per stagione futura
      if (data.config && data.config.team_labels) {
        Object.assign(TEAM_LABEL, data.config.team_labels);
      }
      if (data.config && data.config.venues) {
        Object.assign(VENUES, data.config.venues);
      }
      const ts = data.last_updated
        ? new Date(data.last_updated).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
        : new Date().toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      lastUpdate = ts;
      localStorage.setItem('brc_lu', ts);
      setBadge('ok','<span class="live-dot"></span>LIVE');
      if (manual) showToast('★ DATI AGGIORNATI ★');
      render();
      buildTicker();
      updateSeasonLabels();
    })
    .catch(() => {
      setBadge('ok','<span class="live-dot"></span>'+(lastUpdate?'CACHE':'LOCAL'));
      if (manual) showToast('★ DATI LOCALI ★');
    })
    .finally(() => {
      refreshing = false;
      document.getElementById('refreshBtn').classList.remove('spin');
      document.getElementById('uptime').textContent = lastUpdate ? 'AGG: '+lastUpdate.toUpperCase() : '—';
    });
}

// ============================================================
// TICKER
// ============================================================
function buildTicker() {
  const past = matches
    .filter(m => isPast(m.date) && m.sh != null && m.sa != null)
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(-10);
  if (!past.length) {
    document.getElementById('tickerText').textContent = 'NESSUN RISULTATO ANCORA';
    return;
  }
  const items = past.map(m => {
    const teamShort = m.team==='virtus'?'VIR':'LUI';
    const oppShort = m.away.split(' ').slice(0,2).join(' ').toUpperCase();
    return `${teamShort} ${m.sh}–${m.sa} ${oppShort}`;
  });
  const str = items.join('   ★   ');
  const el = document.getElementById('tickerText');
  el.textContent = str + '   ★   ' + str + '   ★   ';
  startTicker();
}

function startTicker() {
  if (tickerRaf) cancelAnimationFrame(tickerRaf);
  const el = document.getElementById('tickerText');
  if (!el) return;
  let x = 0;
  const totalW = el.scrollWidth / 2;
  const step = () => {
    x -= 0.5;
    if (Math.abs(x) >= totalW) x = 0;
    el.style.transform = `translateX(${x}px)`;
    tickerRaf = requestAnimationFrame(step);
  };
  tickerRaf = requestAnimationFrame(step);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const c = document.getElementById('appContent');
  if (!c) return;
  if (currentTab === 'post') { c.innerHTML = renderPost(); return; }

  const filtered = matches.filter(m => currentTab==='all' || m.team===currentTab)
    .sort((a,b)=>a.date.localeCompare(b.date));
  const upcoming = filtered.filter(m=>!isPast(m.date)||isToday(m.date));
  const past     = filtered.filter(m=>isPast(m.date)&&!isToday(m.date));

  const seasonBanners = renderSeasonBanners();
  let html = renderStandings();

  if (!upcoming.length && seasonBanners) {
    html += seasonBanners;
  } else {
    if (upcoming.length) html += renderHero(upcoming[0]);
    if (seasonBanners) html += seasonBanners;
  }

  if (currentTab==='all') html += renderStats();

  if (upcoming.length) {
    html += `<div class="slbl">► COMING UP — CASA</div><div class="mlist">`;
    upcoming.forEach((m,i) => { html += renderCard(m,i,false); });
    html += `</div>`;
  }

  if (past.length) {
    html += `<div class="slbl">◄ REPLAY — RISULTATI</div><div class="mlist">`;
    [...past].reverse().forEach((m,i) => { html += renderCard(m,i+upcoming.length,true); });
    html += `</div>`;
  }

  if (!upcoming.length && !past.length) {
    html += `<div class="empty">★ NESSUNA PARTITA ★</div>`;
  }

  html += renderSources();
  html += renderFooter();

  c.innerHTML = html;
  if (upcoming.length) startCD(upcoming[0]);
}

function renderStandings() {
  const v = getTeamStats('virtus');
  const l = getTeamStats('luiss');
  const link = classificaUrl
    ? `<a href="${escHtml(classificaUrl)}" target="_blank" rel="noopener" class="schip slink">★ CLASSIFICA UFFICIALE</a>`
    : '';
  const chip = (team, st) => {
    const cls = team==='virtus'?'sv':'sl';
    const lbl = team==='virtus'?'VIRTUS':'LUISS';
    return `<div class="schip ${cls}">
      <div class="schip-crest"><img src="${TEAM_LOGO[team]}" alt=""/></div>
      <span class="schip-rank">${st.pos}°</span>
      <div>
        <div>${lbl} ROMA</div>
        <div class="schip-meta">${st.pts}PT · ${st.w}W—${st.l}L</div>
      </div>
    </div>`;
  };
  return `<div class="stand">${chip('virtus',v)}${chip('luiss',l)}${link}</div>`;
}

function renderHero(m) {
  const tcls = m.team==='virtus'?'tv':'tl';
  const tlabel = TEAM_LABEL[m.team] || (m.team==='virtus'?'VIRTUS ROMA':'LUISS ROMA');
  const v = VENUES[m.team] || {};
  const tod = isToday(m.date) ? `<span class="sb-tag">★ OGGI ★</span>` : '';
  const phaseTxt = phShort(m.phase) + (m.round ? ' · G'+m.round : '');

  return `<div class="scoreboard">
    <div class="sb-topbar ${tcls}">

function startCD(m) {
  if (cdTimer) clearInterval(cdTimer);
  if (!m) return;
  const tick = () => {
    const el = document.getElementById('heroCD');
    if (!el) { clearInterval(cdTimer); return; }
    const [hh,mm] = (m.time||'20:30').split(':').map(Number);
    const t = toDate(m.date); t.setHours(hh,mm,0,0);
    const diff = t - new Date();
    if (diff <= 0) { el.innerHTML = `<div class="lt-live">● LIVE ON AIR ●</div>`; return; }
    const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), mn=Math.floor((diff%3600000)/60000);
    el.innerHTML = `
      <div class="lt-block"><div class="lt-num">${String(d).padStart(2,'0')}</div><div class="lt-lbl">GG</div></div>
      <div class="lt-sep">:</div>
      <div class="lt-block"><div class="lt-num">${String(h).padStart(2,'0')}</div><div class="lt-lbl">HH</div></div>
      <div class="lt-sep">:</div>
      <div class="lt-block"><div class="lt-num">${String(mn).padStart(2,'0')}</div><div class="lt-lbl">MM</div></div>`;
  };
  tick(); cdTimer = setInterval(tick, 30000);
}

function getSeasonWindows() {
  const reg = matches.filter(m => m.phase === 'regular');
  const post = matches.filter(m => ['playoff','playin','playout'].includes(m.phase));
  const all = [...reg, ...post];
  if (!reg.length) return null;

  const toT = m => toDate(m.date).getTime();
  const regularEnd = new Date(Math.max(...reg.map(toT)));
  const lastMatch = new Date(Math.max(...all.map(toT)));
  const hasPostseason = post.length > 0;
  const seasonEnd = hasPostseason ? lastMatch
    : new Date(regularEnd.getTime() + 56 * 86400000);
  const yr = seasonEnd.getFullYear();
  const newSeasonStart = new Date(yr, 8, 1);

  const futureCasa = all.filter(m => toDate(m.date).getTime() >= today().getTime());
  const pastNoScore = reg.filter(m => toDate(m.date) < today() && m.sh === null);
  const postNoScore = post.filter(m => toDate(m.date) < today() && m.sh === null);

  return { regularEnd, seasonEnd, newSeasonStart, hasPostseason,
           futureCasa, pastNoScore, postNoScore, lastMatch };
}

function makeBanner(type, label, title, text, links) {
  const btns = (links||[]).map(l =>
    `<a class="sb-btn" href="${escHtml(l.url)}" target="_blank" rel="noopener">★ ${escHtml(l.label)}</a>`
  ).join('');
  return `<div class="sbnr sb-${type}">
    <div class="sbnr-top"><span class="live-dot"></span>${escHtml(label)}</div>
    <div class="sbnr-body">
      <div class="sbnr-title">${title}</div>
      <div class="sbnr-text">${text}</div>
      ${btns ? `<div class="sbnr-actions">${btns}</div>` : ''}
    </div>
  </div>`;
}

function fmtShort(d) {
  const D=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const M=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  return `${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
}

function renderSeasonBanners() {
  const w = getSeasonWindows();
  if (!w) return '';
  const now = today().getTime();
  const banners = [];

  // SCENARIO A: risultati regular mancanti
  if (w.pastNoScore.length > 0 && now <= w.regularEnd.getTime() + 3 * 86400000) {
    const nomi = w.pastNoScore.map(m =>
      `<em>${escHtml(m.home)} VS ${escHtml(m.away)} (G${m.round})</em>`).join(', ');
    banners.push(makeBanner('warning',
      'BREAKING — RISULTATI MANCANTI',
      `${w.pastNoScore.length} RISULTAT${w.pastNoScore.length>1?'I':'O'} DA AGGIORNARE`,
      `${nomi} — verranno aggiornati automaticamente entro poche ore.`,
      [{label:'CALENDARIO LNP', url:'https://www.legapallacanestro.com/serie/4/calendario'}]
    ));
  }

  // SCENARIO B: regular finita, in attesa playoff
  if (now > w.regularEnd.getTime() && !w.hasPostseason && now <= w.seasonEnd.getTime()) {
    banners.push(makeBanner('action',
      '🏀 FINE REGULAR SEASON',
      'IN ATTESA DEI PLAYOFF',
      `La regular season è terminata il <em>${escHtml(fmtShort(w.regularEnd))}</em>. Le partite di playoff e play-in verranno aggiunte automaticamente quando il calendario sarà disponibile su LNP.`,
      [{label:'CLASSIFICA LNP', url:'https://www.legapallacanestro.com/serie/4/classifica'}]
    ));
  }

  // SCENARIO C: playoff in corso ma risultati mancanti
  if (w.hasPostseason && w.postNoScore.length > 0) {
    banners.push(makeBanner('warning',
      '🏀 PLAYOFF IN CORSO',
      `${w.postNoScore.length} GARA${w.postNoScore.length>1?'E':''} IN PROGRAMMA`,
      `I risultati verranno aggiornati automaticamente al termine delle partite.`,
      [{label:'CALENDARIO LNP', url:'https://www.legapallacanestro.com/serie/4/calendario'}]
    ));
  }

  // SCENARIO D: stagione conclusa
  if (now > w.seasonEnd.getTime() && now < w.newSeasonStart.getTime()) {
    banners.push(makeBanner('done',
      '★ STAGIONE CONCLUSA ★',
      `STAGIONE ${w.seasonEnd.getFullYear()-1}-${String(w.seasonEnd.getFullYear()).slice(2)} TERMINATA`,
      `Tutti i risultati sono definitivi. Il calendario della prossima stagione verrà caricato automaticamente quando disponibile (luglio-agosto).`,
      [{label:'LEGAPALLACANESTRO', url:'https://www.legapallacanestro.com'}]
    ));
  }

  // SCENARIO E: nuova stagione attesa
  if (now >= w.newSeasonStart.getTime()) {
    const yr = w.newSeasonStart.getFullYear();
    const nextYr = yr + 1;
    const hasNewSeason = matches.some(m =>
      m.phase === 'regular' && toDate(m.date).getFullYear() >= yr &&
      toDate(m.date).getTime() >= w.newSeasonStart.getTime()
    );
    if (!hasNewSeason) {
      banners.push(makeBanner('new',
        '★ NUOVA STAGIONE ★',
        `CALENDARIO ${yr}-${String(nextYr).slice(2)}`,
        `In attesa del calendario ufficiale della stagione <em>${yr}-${String(nextYr).slice(2)}</em>. Verrà caricato automaticamente appena disponibile su LNP.`,
        [
          {label:'LNP', url:'https://www.legapallacanestro.com'},
        ]
      ));
    }
  }

  return banners.join('');
}

function setBadge(type, html) {
  const el = document.getElementById('upbadge');
  if (!el) return;
  el.className = 'upbadge ' + type;
  el.innerHTML = html;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  if (notifEnabled) {
    btn.className = 'ibtn on';
    btn.title = 'Notifiche attive';
  } else {
    btn.className = 'ibtn notif-off';
    btn.title = 'Notifiche disattivate';
  }
  btn.textContent = '🔔';
}

async function toggleNotif() {
  if (!('Notification' in window)) { showToast('★ NON SUPPORTATE ★'); return; }
  if (notifEnabled) {
    notifEnabled = false; localStorage.setItem('brc_n','0');
    updateNotifBtn();
    showToast('★ NOTIFICHE OFF ★'); return;
  }
  const p = await Notification.requestPermission();
  if (p==='granted') {
    notifEnabled=true; localStorage.setItem('brc_n','1');
    updateNotifBtn();
    scheduleNotif(); showToast('★ NOTIFICHE ON ★');
  } else showToast('★ PERMESSO NEGATO ★');
}

function scheduleNotif() {
  matches.filter(m=>!isPast(m.date)).forEach(m=>{
    const [hh,mm]=(m.time||'20:30').split(':').map(Number);
    const t=toDate(m.date); t.setHours(hh,mm,0,0);
    const delay=t.getTime()-86400000-Date.now();
    if(delay>0&&delay<7*86400000) setTimeout(()=>{
      if(!notifEnabled)return;
      new Notification('🏀 Partita domani!',{body:`${m.home} vs ${m.away}${m.time?' ore '+m.time:''}`});
    },delay);
  });
}

<script>
// ============================================================
// SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg => {
    setInterval(() => reg.update(), 30 * 60 * 1000);
    const onWaiting = () => showUpdateBanner();
    if (reg.waiting) onWaiting();
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (newWorker) {
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            onWaiting();
          }
        });
      }
    });
  }).catch(() => {});

  let swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!swRefreshing) { swRefreshing = true; window.location.reload(); }
  });

  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'DATA_UPDATED') {
      doRefresh(false);
    }
  });
}

function showUpdateBanner() {
  if (document.getElementById('updateBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'updateBanner';
  banner.innerHTML = `
    <span>★ NUOVA VERSIONE ★</span>
    <button class="update-go" onclick="applyUpdate()">AGGIORNA</button>
    <button class="update-x" onclick="this.parentElement.remove()">✕</button>
  `;
  document.body.appendChild(banner);
}

function applyUpdate() {
  navigator.serviceWorker.getRegistration().then(reg => {
    if (reg && reg.waiting) {
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
  });
}
</script>
