<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Roma Basket Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* PRESERVO IL TUO CSS ORIGINALE CLAUDE */
:root{--v:#C8102E;--l:#003087;--g:#F5C518;--bg:#0a0a0f;--card:#13131a;--bd:rgba(255,255,255,.07);--tx:#f0f0f0;--mu:#777;--gr:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
header{background:rgba(10,10,15,.96);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--bd);backdrop-filter:blur(12px)}
.hrow{display:flex;align-items:center;gap:8px;padding:16px 16px 12px}
h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;flex:1}
.ibtn{background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--mu);border-radius:10px;padding:7px 12px;cursor:pointer;font-size:15px;line-height:1}
.uprow{display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px}
.uptime{font-size:10px;color:var(--mu)}
.upbadge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.upbadge.ok{background:rgba(74,222,128,.1);color:var(--gr)}
.tabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.tab{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid transparent;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;white-space:nowrap}
.tab.on{background:rgba(255,255,255,.12);color:#fff}
.tab.tv.on{background:var(--v)}
.tab.tl.on{background:var(--l)}
.tab.tp.on{background:var(--g);color:#000}
.stand{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 0}
.schip{flex-shrink:0;padding:8px 14px;border-radius:12px;border:1px solid;font-size:12px}
.hero{margin:14px 16px 0;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,.06)}
.hero.hv{background:linear-gradient(135deg,#150008,#2d0011)}
.hero.hl{background:linear-gradient(135deg,#000918,#001848)}
.hlabel{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
.hmatch{display:flex;align-items:baseline;gap:8px;font-size:20px;font-weight:700}
.hvs{font-size:12px;color:var(--mu)}
.hmeta{font-size:12px;color:var(--mu);margin:8px 0}
.hcd{display:flex;gap:12px;margin-top:10px}
.cdn{font-family:'Bebas Neue',sans-serif;font-size:24px}
.cdl{font-size:9px;color:var(--mu);text-transform:uppercase}
.mlist{padding:0 16px 100px}
.mcard{background:var(--card);border:1px solid var(--bd);border-radius:14px;margin-bottom:9px;padding:14px;position:relative}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.cv::before{background:var(--v)}.cl::before{background:var(--l)}
.mcres{font-family:'Bebas Neue',sans-serif;font-size:18px}
.win{color:var(--gr)}.loss{color:var(--v)}
.bigbadge{background:var(--g);color:#000;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;margin-bottom:4px;display:inline-block}
.tktbtn{display:inline-block;background:rgba(245,197,24,.15);color:var(--g);text-decoration:none;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;margin-top:10px;border:1px solid rgba(245,197,24,0.3)}

/* POST SEASON */
.psblock{margin:14px 16px;background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px}
.pstitle{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--g);margin-bottom:10px}
.psrow{font-size:13px;margin-bottom:6px;color:#aaa}
.psrow b{color:#fff}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <h1>🏀 Roma Basket</h1>
    <button class="ibtn">↻</button>
  </div>
  <div class="uprow">
    <span class="uptime" id="uptime">Agg: 03/04, 15:40</span>
    <span class="upbadge ok">✅ Live</span>
  </div>
  <div class="tabs">
    <button class="tab ta on" onclick="setTab('all')">Tutte</button>
    <button class="tab tv" onclick="setTab('virtus')">Virtus</button>
    <button class="tab tl" onclick="setTab('luiss')">LUISS</button>
    <button class="tab tp" onclick="setTab('post')">Post Season</button>
  </div>
</header>

<div id="appContent"></div>

<script>
// DATI CABLATI (Hardcoded) - Torniamo ai dati sicuri di Claude
const DATA = {
  standings: {
    virtus: { pos: 3, pts: 32, w: 16, l: 8 },
    luiss: { pos: 7, pts: 24, w: 12, l: 12 }
  },
  matches: [
    { date: "2026-04-05", time: "18:00", round: 28, home: "Virtus GVM Roma", away: "Fortitudo Bologna", team: "virtus", big: true, tkt: "https://www.ticketone.it/artist/virtus-roma-1960/", sh: null, sa: null },
    { date: "2026-04-12", time: "20:30", round: 29, home: "LUISS Roma", away: "Trapani Shark", team: "luiss", big: false, tkt: "https://www.vivaticket.com/it/tour/luiss-basket-roma/3534", sh: null, sa: null },
    { date: "2026-04-19", time: "18:00", round: 30, home: "Virtus GVM Roma", away: "Pallacanestro Cantù", team: "virtus", big: true, tkt: "https://www.ticketone.it/artist/virtus-roma-1960/", sh: null, sa: null },
    { date: "2026-03-29", time: "18:00", round: 27, home: "LUISS Roma", away: "Scaligera Verona", team: "luiss", big: false, tkt: null, sh: 78, sa: 72 },
    { date: "2026-03-22", time: "18:00", round: 26, home: "Virtus GVM Roma", away: "APU Udine", team: "virtus", big: true, tkt: null, sh: 85, sa: 80 }
  ]
};

let currentTab = 'all';

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('on'));
  const sel = t==='all'?'.ta':t==='virtus'?'.tv':t==='luiss'?'.tl':'.tp';
  document.querySelector(sel).classList.add('on');
  render();
}

function render() {
  const container = document.getElementById('appContent');
  if (currentTab === 'post') {
    container.innerHTML = `
      <div class="psblock">
        <div class="pstitle">Post Season 2025-26</div>
        <div class="psrow"><b>Playoff:</b> Inizio 8 Maggio 2026</div>
        <div class="psrow"><b>Virtus Roma:</b> Attualmente 3ª (Qualificata)</div>
        <div class="psrow"><b>LUISS Roma:</b> Attualmente 7ª (In corsa)</div>
      </div>`;
    return;
  }

  let html = `<div class="stand">
    <div class="schip" style="border-color:var(--v);color:var(--v)"><b>${DATA.standings.virtus.pos}°</b> Virtus: ${DATA.standings.virtus.pts}pt</div>
    <div class="schip" style="border-color:var(--l);color:var(--l)"><b>${DATA.standings.luiss.pos}°</b> LUISS: ${DATA.standings.luiss.pts}pt</div>
  </div>`;

  const filtered = DATA.matches.filter(m => currentTab === 'all' || m.team === currentTab);
  
  html += `<div class="mlist">`;
  filtered.forEach(m => {
    const isPast = m.sh !== null;
    const resClass = m.sh > m.sa ? 'win' : 'loss';
    const bigBadge = m.big ? `<span class="bigbadge">🔥 BIG MATCH</span>` : '';
    const tktBtn = (m.tkt && !isPast) ? `<br><a href="${m.tkt}" target="_blank" class="tktbtn">🎫 Biglietti</a>` : '';

    html += `
      <div class="mcard ${m.team === 'virtus' ? 'cv' : 'cl'}">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:10px;color:var(--mu)">${m.date}</span>
          ${bigBadge}
        </div>
        <div class="hmatch"><span>${m.home}</span> <span class="hvs">vs</span> <span>${m.away}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <span style="font-size:11px;color:var(--mu)">G${m.round} ${!isPast ? '· '+m.time : ''}</span>
          <span class="mcres ${isPast ? resClass : ''}">${isPast ? m.sh + '-' + m.sa : 'TBD'}</span>
        </div>
        ${tktBtn}
      </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

render();
</script>
</body>
</html>
