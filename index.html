<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roma Basket">
<meta name="theme-color" content="#C8102E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Roma Basket Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* PRESERVO IL TUO CSS ORIGINALE */
:root{--v:#C8102E;--l:#003087;--g:#F5C518;--bg:#0a0a0f;--card:#13131a;--bd:rgba(255,255,255,.07);--tx:#f0f0f0;--mu:#777;--gr:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
header{background:rgba(10,10,15,.96);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--bd);backdrop-filter:blur(12px)}
.hrow{display:flex;align-items:center;gap:8px;padding:16px 16px 12px}
h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;flex:1}
.ibtn{background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--mu);border-radius:10px;padding:7px 12px;cursor:pointer;font-size:15px;line-height:1;transition:.2s}
.uprow{display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px}
.uptime{font-size:10px;color:var(--mu)}
.upbadge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.upbadge.ok{background:rgba(74,222,128,.1);color:var(--gr)}
.tabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.tab{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid transparent;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;white-space:nowrap}
.tab.ta.on{background:rgba(255,255,255,.12);color:#fff}
.tab.tv.on{background:var(--v);color:#fff}
.tab.tl.on{background:var(--l);color:#fff}

/* NUOVI STILI PER LE AGGIUNTE */
.big-match-badge {
    background: linear-gradient(45deg, #ff4e50, #f9d423);
    color: #000;
    font-weight: 800;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 8px;
    animation: flash 1.5s infinite;
}
@keyframes flash { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

.ticket-btn {
    display: inline-block;
    background: var(--g);
    color: #000;
    text-decoration: none;
    font-weight: 700;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    margin-top: 8px;
}

/* Stili originali per cards e sezioni[cite: 5] */
.stand{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 0}
.schip{flex-shrink:0;padding:8px 14px;border-radius:12px;border:1px solid;font-size:12px}
.hero{margin:14px 16px 0;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,.06)}
.mlist{padding:0 16px 100px}
.mcard{background:var(--card);border:1px solid var(--bd);border-radius:14px;margin-bottom:9px;padding:13px 14px;position:relative}
.mcres{font-family:'Bebas Neue',sans-serif;font-size:18px}
.win{color:var(--gr)}
.loss{color:var(--v)}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <h1>🏀 Roma Basket</h1>
    <button class="ibtn" onclick="doRefresh(true)">↻</button>
  </div>
  <div class="uprow">
    <span class="uptime" id="uptime">Aggiornamento automatico</span>
    <span class="upbadge ok" id="upbadge">LIVE</span>
  </div>
  <div class="tabs">
    <button class="tab ta on" onclick="setTab('all')">Tutte</button>
    <button class="tab tv" onclick="setTab('virtus')">Virtus</button>
    <button class="tab tl" onclick="setTab('luiss')">LUISS</button>
  </div>
</header>

<div id="appContent"></div>

<script>
let matches = [];
let standings = {};
let currentTab = 'all';

// FUNZIONE CARICAMENTO DATI (Ora punta al tuo data.json esterno)
async function doRefresh(manual) {
    try {
        const response = await fetch('data.json?v=' + Date.now());
        const data = await response.json();
        matches = data.matches;
        standings = data.standings;
        if(data.last_updated) {
            document.getElementById('uptime').textContent = "Agg: " + new Date(data.last_updated).toLocaleString();
        }
        render();
    } catch (e) {
        console.error("Errore caricamento dati", e);
    }
}

function setTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('on'));
    if(t === 'all') document.querySelector('.tab.ta').classList.add('on');
    if(t === 'virtus') document.querySelector('.tab.tv').classList.add('on');
    if(t === 'luiss') document.querySelector('.tab.tl').classList.add('on');
    render();
}

function render() {
    const container = document.getElementById('appContent');
    let html = '';

    // Classifica (Stile originale)[cite: 5]
    html += `<div class="stand">
        <div class="schip" style="color:var(--v)"><b>${standings.virtus?.pos}°</b> Virtus: ${standings.virtus?.pts}pt</div>
        <div class="schip" style="color:var(--l)"><b>${standings.luiss?.pos}°</b> LUISS: ${standings.luiss?.pts}pt</div>
    </div>`;

    const filtered = matches.filter(m => currentTab === 'all' || m.team === currentTab);

    html += `<div class="mlist">`;
    filtered.forEach(m => {
        const isPast = m.sh !== null;
        const bigMatch = m.big_match ? `<span class="big-match-badge">🔥 BIG MATCH</span>` : '';
        const ticket = (!isPast && m.ticket_url) ? `<a href="${m.ticket_url}" target="_blank" class="ticket-btn">🎫 BIGLIETTI</a>` : '';
        const resClass = m.sh > m.sa ? 'win' : 'loss';

        html += `
            <div class="mcard" style="border-left: 4px solid ${m.team === 'virtus' ? 'var(--v)' : 'var(--l)'}">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                    <span style="font-size:10px; color:var(--mu)">${m.date} ${m.time || ''}</span>
                    ${bigMatch}
                </div>
                <div style="font-weight:700; font-size:16px">${m.home} vs ${m.away}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px">
                    <span style="font-size:11px; color:var(--mu)">Giornata ${m.round}</span>
                    <span class="mcres ${isPast ? resClass : ''}">${isPast ? m.sh + '-' + m.sa : 'DA GIOCARE'}</span>
                </div>
                ${ticket}
            </div>
        `;
    });
    html += `</div>`;
    
    container.innerHTML = html;
}

// Avvio
doRefresh();
</script>
</body>
</html>
