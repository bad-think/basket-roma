<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roma Basket">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C8102E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Roma Basket Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--v:#C8102E;--l:#003087;--g:#F5C518;--bg:#0a0a0f;--card:#13131a;--bd:rgba(255,255,255,.07);--tx:#f0f0f0;--mu:#777;--gr:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;line-height:1.5;padding-bottom:100px;overflow-x:hidden}
.header{padding:25px 20px 15px;display:flex;justify-content:space-between;align-items:flex-start}
.logo-area h1{font-family:'Bebas Neue',cursive;font-size:2.4rem;line-height:0.9;color:var(--tx);letter-spacing:0.5px}
.logo-area p{font-size:0.75rem;color:var(--mu);text-transform:uppercase;letter-spacing:3px;margin-top:4px}
.upbadge{padding:6px 12px;border-radius:20px;font-size:0.65rem;font-weight:700;background:var(--card);border:1px solid var(--bd);color:var(--mu);transition:all 0.3s}
.upbadge.ok{color:var(--gr);border-color:rgba(74,222,128,0.2)}
.container{padding:0 16px}
.section-title{font-family:'Bebas Neue',cursive;font-size:1.6rem;margin:30px 0 15px;display:flex;align-items:center;gap:12px;color:var(--tx)}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg, var(--bd), transparent)}
.next-card{background:var(--card);border-radius:28px;padding:25px;border:1px solid var(--bd);margin-bottom:25px;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.next-card::before{content:'';position:absolute;top:0;left:0;width:6px;height:100%;background:var(--v)}
.next-card.luiss::before{background:var(--l)}
.team-row{display:flex;justify-content:space-between;align-items:center;margin:15px 0}
.team-name{font-family:'Bebas Neue',cursive;font-size:2.1rem;line-height:1;flex:1}
.vs-circle{width:40px;height:40px;border-radius:50%;background:var(--bg);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:1.2rem;color:var(--mu);margin:0 15px}
.match-meta{display:flex;gap:20px;margin-top:20px;padding-top:15px;border-top:1px solid var(--bd)}
.meta-item{display:flex;flex-direction:column}
.meta-label{font-size:0.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px}
.meta-val{font-size:0.95rem;font-weight:700}
.std-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.std-card{background:var(--card);padding:20px;border-radius:24px;border:1px solid var(--bd);text-align:center;position:relative}
.std-pos{font-family:'Bebas Neue',cursive;font-size:2.8rem;line-height:1;margin-bottom:5px;color:var(--v)}
.std-card.luiss .std-pos{color:var(--l)}
.std-team{font-size:0.7rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.std-pts{font-weight:700;color:var(--tx);background:var(--bg);padding:4px 12px;border-radius:12px;display:inline-block;font-size:0.85rem}
.match-list{display:flex;flex-direction:column;gap:10px}
.m-item{background:var(--card);padding:16px 20px;border-radius:20px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bd)}
.m-info{display:flex;flex-direction:column}
.m-date{font-size:0.75rem;color:var(--mu);font-weight:700}
.m-opponent{font-weight:700;font-size:1rem;margin-top:2px}
.m-score{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--g);letter-spacing:1px}
#update-toast{position:fixed;bottom:30px;left:20px;right:20px;background:var(--g);color:#000;padding:16px;border-radius:20px;font-weight:700;display:none;z-index:99;box-shadow:0 15px 40px rgba(0,0,0,0.6);text-align:center;animation:slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
@keyframes slideUp{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<div id="update-toast" onclick="window.location.reload()">✨ Nuovi dati disponibili! Tocca per aggiornare</div>

<div class="header">
  <div class="logo-area"><h1>Roma Basket</h1><p>Casa 2025-26</p></div>
  <div id="upbadge" class="upbadge">📋 Caricamento...</div>
</div>

<div class="container">
  <div id="next-match-area"></div>
  <div class="section-title">Classifica Girone B</div>
  <div class="std-grid" id="standings-area"></div>
  <div class="section-title">Calendario</div>
  <div class="match-list" id="match-list-area"></div>
</div>

<div style="text-align:center;margin-top:50px;opacity:0.2;font-size:0.6rem;letter-spacing:1px">
  ULTIMO SYNC: <span id="uptime">—</span>
</div>

<script>
let data = null;

async function init() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    data = await res.json();
    render();
  } catch (e) { console.error("Errore fetch"); }
}

function render() {
  if(!data) return;
  const lastUpdate = data.last_updated || '—';
  document.getElementById('uptime').textContent = lastUpdate;
  document.getElementById('upbadge').textContent = '📋 ' + lastUpdate;
  document.getElementById('upbadge').classList.add('ok');

  const today = new Date(); today.setHours(0,0,0,0);
  const matches = data.matches || [];
  
  // Trova prossima partita in casa
  const nextMatch = matches.find(m => new Date(m.date) >= today);
  
  if(nextMatch) {
    const isV = nextMatch.team === 'virtus';
    document.getElementById('next-match-area').innerHTML = `
      <div class="section-title">Prossimo Match</div>
      <div class="next-card ${isV?'virtus':'luiss'}">
        <div class="team-row">
          <div class="team-name" style="text-align:left">${nextMatch.home}</div>
          <div class="vs-circle">VS</div>
          <div class="team-name" style="text-align:right">${nextMatch.away}</div>
        </div>
        <div class="match-meta">
          <div class="meta-item"><span class="meta-label">Data</span><span class="meta-val">${fmtDate(nextMatch.date)}</span></div>
          <div class="meta-item"><span class="meta-label">Ora</span><span class="meta-val">${nextMatch.time || 'TBD'}</span></div>
        </div>
      </div>`;
  }

  if(data.standings) {
    document.getElementById('standings-area').innerHTML = `
      <div class="std-card"><div class="std-pos">${data.standings.virtus.pos}°</div><div class="std-team">Virtus Roma</div><div class="std-pts">${data.standings.virtus.pts} PT</div></div>
      <div class="std-card luiss"><div class="std-pos">${data.standings.luiss.pos}°</div><div class="std-team">Luiss Roma</div><div class="std-pts">${data.standings.luiss.pts} PT</div></div>`;
  }

  document.getElementById('match-list-area').innerHTML = matches.map(m => `
    <div class="m-item">
      <div class="m-info">
        <div class="m-date">${m.date.split('-').reverse().slice(0,2).join('/')}</div>
        <div class="m-opponent">${m.away}</div>
      </div>
      <div class="m-score">${m.sh !== null ? m.sh + ' - ' + m.sa : m.time || 'TBD'}</div>
    </div>`).join('');
}

function fmtDate(s) { 
  return new Date(s).toLocaleDateString('it-IT', {day:'2-digit', month:'long'}).toUpperCase(); 
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
init();
</script>
</body>
</html>
