<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Roma Basket Casa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #C8102E; --secondary: #003087; --bg: #0a0a0f; --card: #16161e; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #2d2d3d; }
        .next-match { border-left: 5px solid var(--primary); }
        .match-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .team-name { font-weight: bold; font-size: 1.1em; }
        .score { font-size: 1.2em; color: #ffcc00; font-weight: bold; }
        .date { font-size: 0.9em; color: #aaa; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 5px; font-size: 0.7em; text-transform: uppercase; margin-bottom: 5px; }
        .badge-virtus { background: var(--primary); }
        .badge-luiss { background: var(--secondary); }
        .standings { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .standings td { padding: 10px; border-bottom: 1px solid #2d2d3d; }
        .footer { text-align: center; font-size: 0.7em; color: #666; margin-top: 40px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Roma Basket Casa</h1>
    <div id="last-update" style="font-size: 0.8em; color: #888;">Caricamento dati...</div>
</div>

<div id="app">
    </div>

<div class="footer">
    Aggiornato automaticamente via GitHub Actions
</div>

<script>
    async function loadData() {
        try {
            const response = await fetch('data.json');
            const data = await response.json();
            document.getElementById('last-update').innerText = "Ultimo aggiornamento: " + data.last_updated;
            renderApp(data);
        } catch (e) {
            document.getElementById('app').innerHTML = "<p>Errore nel caricamento dei dati.</p>";
        }
    }

    function renderApp(data) {
        const app = document.getElementById('app');
        let html = "";

        // Prossima partita
        const now = new Date();
        const next = data.matches.find(m => new Date(m.date) >= now.setHours(0,0,0,0));

        if (next) {
            html += `<div class="card next-match">
                <div class="badge ${next.team === 'virtus' ? 'badge-virtus' : 'badge-luiss'}">${next.team}</div>
                <div class="match-row">
                    <span class="team-name">${next.home}</span>
                    <span>vs</span>
                    <span class="team-name">${next.away}</span>
                </div>
                <div class="date">📅 ${next.date} ore ${next.time || 'TBD'}</div>
            </div>`;
        }

        // Calendario
        html += "<h3>Calendario Casa</h3>";
        data.matches.forEach(m => {
            html += `<div class="card">
                <div class="match-row">
                    <span style="font-size: 0.8em; color: #888;">${m.date}</span>
                    <span class="team-name">${m.away}</span>
                    <span class="score">${m.sh !== null ? m.sh + '-' + m.sa : m.time}</span>
                </div>
            </div>`;
        });

        app.innerHTML = html;
    }

    loadData();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
