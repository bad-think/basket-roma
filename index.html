// Estrae risultati Girone B dal testo HTML di una pagina pianetabasket
function parseGironeBResults(html) {
  const results = [];

  // Pattern: DD/MM/YYYY HH:MM NomeSquadra1-NomeSquadra2 NN-NN
  // oppure senza risultato (partita futura)
  const lines = html.replace(/&amp;/g,'&').replace(/&#x27;/g,"'").replace(/<[^>]+>/g,' ').split('\n');

  for (const line of lines) {
    // cerca pattern data + squadre + risultato tipo "08/03/2026 17:00 Luiss Roma-Allianz Pazienza San Severo 68-70"
    const m = line.match(/(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+(.+?)\s+(\d+)-(\d+)\s*$/);
    if (m) {
      const [,dateRaw,time,matchup,sh,sa] = m;
      const [dd,mm,yyyy] = dateRaw.split('/');
      const date = `${yyyy}-${mm}-${dd}`;
      // splitta le due squadre sul trattino centrale
      const parts = matchup.split('-');
      if (parts.length >= 2) {
        const home = parts[0].trim();
        const away = parts.slice(1).join('-').trim();
        results.push({date, time, home, away, sh:parseInt(sh), sa:parseInt(sa)});
      }
    }
  }
  return results;
}

    .replace(/luiss roma/g,'luiss')
    .replace(/luiss/g,'luiss')
    .replace(/consultinvest loreto pesaro/g,'loreto pesaro')
    .replace(/loreto basket pesaro/g,'loreto pesaro')
    .replace(/consorzio leonardo dany quarrata/g,'dany quarrata')
    .replace(/consorzio leonardo dany basket quarrata/g,'dany quarrata')
    .replace(/paperdi juvecaserta 2021/g,'juvecaserta')
    .replace(/paperdi juve caserta/g,'juvecaserta')
    .replace(/tema sinergie faenza/g,'faenza')
    .replace(/raggisolaris faenza/g,'faenza')
    .replace(/malvin psa basket casoria/g,'casoria')
    .replace(/psa basket casoria/g,'casoria')
    .replace(/verodol cbd pielle livorno/g,'pielle livorno')
    .replace(/up andrea costa imola/g,'andrea costa imola')
    .replace(/benacquista assicurazioni latina/g,'latina')
    .replace(/allianz pazienza san severo/g,'san severo')
    .replace(/umana san giobbe chiusi/g,'chiusi')
    .replace(/general contractor jesi/g,'jesi')
    .replace(/solbat golfo piombino/g,'piombino')
    .replace(/solbat basket golfo piombino/g,'piombino')
    .replace(/orasi ravenna/g,'ravenna')
    .replace(/orasì ravenna/g,'ravenna')
    .replace(/power basket nocera/g,'nocera')
    .replace(/adamant ferrara/g,'ferrara')
    .replace(/virtus imola/g,'v.imola')
    .replace(/ristopro fabriano/g,'fabriano')
    .replace(/\s+/g,' ').trim();

  const mHome = normalise(match.home);
  const mDate = match.date;

  return scraped.find(s => {
    const sHome = normalise(s.home);
    const sameDateRange = Math.abs(parseDate(s.date) - parseDate(mDate)) <= 3*86400000;
    const homeMatch = sHome.includes(mHome) || mHome.includes(sHome) ||
      (mHome.includes('virtus roma') && sHome.includes('virtus')) ||
      (mHome.includes('luiss') && sHome.includes('luiss'));
    return sameDateRange && homeMatch;
  });
}

// Cerca le ultime pagine risultati Girone B su pianetabasket tramite proxy
async function scrapeLatestResults() {
  // Prova a scaricare le ultime 3 pagine di risultati Girone B
  // Le URL seguono il pattern noto, proviamo le giornate attorno a quella attuale
  const today = new Date();
  const knownUrls = [
    // 31ª giornata (ultima con risultati certi)
    'https://www.pianetabasket.com/serie-b/serie-b-nazionale-calendario-risultati-le-gare-di-lunedi-classifiche-31-giornata-2025-26-356237',
    // 32ª giornata — proveremo dopo il 22/03
    'https://www.pianetabasket.com/serie-b/serie-b-nazionale-calendario-risultati-classifiche-32-giornata-2025-26-357000',
    // 33ª giornata
    'https://www.pianetabasket.com/serie-b/serie-b-nazionale-calendario-risultati-classifiche-33-giornata-2025-26-358000',
    // Classifica aggiornata (pagina principale Serie B)
    'https://www.pianetabasket.com/serie-b/',
  ];

  const allScraped = [];
  let standingsRaw = null;

  for (const url of knownUrls) {
    try {
      const proxyUrl = PROXY + encodeURIComponent(url);
      const resp = await fetch(proxyUrl, {signal: AbortSignal.timeout(8000)});
      if (!resp.ok) continue;
      const data = await resp.json();
      const html = data.contents || '';
      if (!html) continue;

      const scraped = parseGironeBResults(html);
      allScraped.push(...scraped);

      // Estrai classifica Girone B se presente
      const standMatch = html.match(/Virtus GVM Roma 1960\s+(\d+)\s+(\d+)-(\d+)/);
      const luissMatch = html.match(/Luiss Roma\s+(\d+)\s+(\d+)-(\d+)/);
      if (standMatch && luissMatch) {
        // cerca posizione
        const gironeBBlock = html.match(/Classifica girone B[\s\S]{0,3000}/i);
        if (gironeBBlock) {
          const block = gironeBBlock[0];
          const teams = [...block.matchAll(/^(.+?)\s+(\d+)\s+(\d+)-(\d+)/gm)].map((m,i)=>({name:m[1].trim(),pos:i+1,pts:+m[2],w:+m[3],l:+m[4]}));
          const vEntry = teams.find(t=>t.name.toLowerCase().includes('virtus gvm'));
          const lEntry = teams.find(t=>t.name.toLowerCase().includes('luiss'));
          if (vEntry && lEntry) standingsRaw = {virtus:{pos:vEntry.pos,pts:vEntry.pts,w:vEntry.w,l:vEntry.l}, luiss:{pos:lEntry.pos,pts:lEntry.pts,w:lEntry.w,l:lEntry.l}};
        }
      }
    } catch(e) { /* ignora errori singoli URL */ }
  }

  return {scraped: allScraped, standingsRaw};
}

async function doRefresh(silent=false) {
  if (isRefreshing) return;
  isRefreshing = true;
  document.getElementById('refreshBtn').classList.add('spinning');
  setStatus('loading','⏳ Aggiornamento...');
  setProgress(15);

  try {
    setProgress(35);
    const {scraped, standingsRaw} = await scrapeLatestResults();
    setProgress(70);

    let updated = 0;

    // Applica risultati trovati alle partite in casa già passate senza risultato
    matches.forEach(m => {
      if (isPast(m.date) && m.sh == null) {
        const found = matchResult(scraped, m);
        if (found) {
          m.sh = found.sh;
          m.sa = found.sa;
          if (found.time) m.time = found.time;
          updated++;
        }
      }
      // Aggiorna anche orario se partita futura e trovato
      if (!isPast(m.date)) {
        const found = matchResult(scraped, m);
        if (found && found.time && found.time !== m.time) {
          m.time = found.time;
          updated++;
        }
      }
    });

    if (standingsRaw && standingsRaw.virtus.pts >= standings.virtus.pts) {
      standings = standingsRaw;
      localStorage.setItem('brc_standings3', JSON.stringify(standings));
    }

    localStorage.setItem('brc_matches3', JSON.stringify(matches));
    const now = new Date();
    lastUpdate = now.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('brc_lastUpdate3', lastUpdate);

    setStatus('ok','✅ Live');
    setProgress(100);
    if (!silent) showToast(`✅ Aggiornato — ${updated} nuovi risultati`);

  } catch(e) {
    console.error(e);
    setStatus('err','⚠️ Cache');
    if (!silent) showToast('⚠️ Errore di rete — uso dati in cache');
  }

  isRefreshing = false;
  document.getElementById('refreshBtn').classList.remove('spinning');
  document.getElementById('lastUpdate').textContent = lastUpdate ? `Agg: ${lastUpdate}` : '—';
  render();
}

// ================================================================
// RENDER
// ================================================================
function render() {
  renderPhaseBar();
  renderStandings();
  renderHero();
  renderStats();
  renderMatches();
  document.getElementById('lastUpdate').textContent = lastUpdate ? `Agg: ${lastUpdate}` : '—';
  const nb = document.getElementById('notifBtn');
  nb.className = 'icon-btn'+(notifEnabled?' active':'');
  nb.textContent = notifEnabled ? '🔔' : '🔕';
}

function getFiltered() {
  return matches.filter(m=>{
    if (currentTab!=='all' && m.team!==currentTab) return false;
    if (currentPhase!=='all' && m.phase!==currentPhase) return false;
    return true;
  }).sort((a,b)=>a.date.localeCompare(b.date));
}

function renderPhaseBar() {
  const phases=['all',...[...new Set(matches.map(m=>m.phase))].sort()];
  const labels={all:'Tutte',regular:'Regular',playin:'Play-In',playoff:'Playoff',playout:'Playout'};
  document.getElementById('phaseBar').innerHTML=phases.map(p=>
    `<div class="phase-chip${currentPhase===p?' active':''}" onclick="setPhase('${p}')">${labels[p]||p}</div>`
  ).join('');
}

function renderStandings() {
  const s=standings;
  document.getElementById('standingBar').innerHTML=`
    <div class="standing-chip virtus"><strong>${s.virtus.pos}°</strong> Virtus Roma — ${s.virtus.pts}pt (${s.virtus.w}V-${s.virtus.l}P)</div>
    <div class="standing-chip luiss"><strong>${s.luiss.pos}°</strong> LUISS Roma — ${s.luiss.pts}pt (${s.luiss.w}V-${s.luiss.l}P)</div>
  `;
}

function renderHero() {
  const upcoming=getFiltered().filter(m=>!isPast(m.date)||isToday(m.date));
  const wrap=document.getElementById('heroWrap');
  wrap.innerHTML='';
  if (!upcoming.length) return;
  const m=upcoming[0];
  const teamName=m.team==='virtus'?'Virtus GVM Roma':'LUISS Roma';
  const todayBadge=isToday(m.date)?'<span style="background:var(--gold);color:#000;font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:8px">OGGI</span>':'';
  const timeStr=m.time?` · ore ${m.time}`:'';
  const noteEl=m.phase!=='regular'?`<div style="font-size:11px;color:var(--muted);font-style:italic;padding:0 16px 14px">📋 ${phaseLabel(m.phase)}${m.note?' · '+m.note:''}</div>`:'';
  wrap.innerHTML=`
    <div class="hero-wrap">
      <div class="next-hero ${m.team}">
        <div class="hero-label">PROSSIMA PARTITA IN CASA</div>
        <div class="hero-team ${m.team}">${teamName.toUpperCase()}</div>
        <div class="hero-body">
          <div class="hero-teams"><span class="hero-home">${m.home}</span><span class="hero-vs">vs</span><span class="hero-away">${m.away}</span></div>
          <div class="hero-meta">📅 ${fmtDate(m.date)}${timeStr} ${todayBadge} · ${phaseLabel(m.phase)}${m.round?' · G'+m.round:''}</div>
          <div class="hero-cd" id="heroCD"></div>
        </div>
        ${noteEl}
      </div>
    </div>`;
  startCountdown(m.date,m.time);
}

function startCountdown(dateStr,timeStr) {
  if (cdInterval) clearInterval(cdInterval);
  const update=()=>{
    const el=document.getElementById('heroCD'); if(!el){clearInterval(cdInterval);return;}
    const [hh,mm]=(timeStr||'20:30').split(':').map(Number);
    const target=parseDate(dateStr); target.setHours(hh||20,mm||30,0,0);
    const diff=target-new Date();
    if(diff<=0){el.innerHTML=`<div class="cd-unit"><div class="cd-num" style="color:var(--gold)">LIVE 🏀</div></div>`;return;}
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),min=Math.floor((diff%3600000)/60000);
    el.innerHTML=`<div class="cd-unit"><div class="cd-num">${d}</div><div class="cd-lbl">giorni</div></div><div class="cd-unit"><div class="cd-num">${h}</div><div class="cd-lbl">ore</div></div><div class="cd-unit"><div class="cd-num">${min}</div><div class="cd-lbl">min</div></div>`;
  };
  update(); cdInterval=setInterval(update,30000);
}

function renderStats() {
  const wrap=document.getElementById('statsWrap');
  if(currentTab!=='all'){wrap.innerHTML='';return;}
  const wins=arr=>arr.filter(m=>m.sh!=null&&m.sh>m.sa).length;
  const vAll=matches.filter(m=>m.team==='virtus'&&m.phase==='regular'&&isPast(m.date)&&m.sh!=null);
  const lAll=matches.filter(m=>m.team==='luiss'&&m.phase==='regular'&&isPast(m.date)&&m.sh!=null);
  const rem=getFiltered().filter(m=>!isPast(m.date)).length;
  wrap.innerHTML=`<div class="stats-bar">
    <div class="stat-item"><div class="stat-num v">${wins(vAll)}/${vAll.length}</div><div class="stat-lbl">Virtus Casa</div></div>
    <div class="stat-item"><div class="stat-num l">${wins(lAll)}/${lAll.length}</div><div class="stat-lbl">LUISS Casa</div></div>
    <div class="stat-item"><div class="stat-num">${rem}</div><div class="stat-lbl">Rimanenti</div></div>
  </div>`;
}

function renderMatches() {
  const cont=document.getElementById('mainContent');
  const list=getFiltered();
  const upcoming=list.filter(m=>!isPast(m.date)||isToday(m.date));
  const past=list.filter(m=>isPast(m.date)&&!isToday(m.date));
  let html='';
  if(upcoming.length){html+=`<div class="section-lbl">Prossime partite in casa</div><div class="match-list">`;upcoming.forEach((m,i)=>html+=card(m,i));html+=`</div>`;}
  if(past.length){html+=`<div class="section-lbl">Partite giocate</div><div class="match-list">`;[...past].reverse().forEach((m,i)=>html+=card(m,i+upcoming.length));html+=`</div>`;}
  if(!list.length) html=`<div class="empty">Nessuna partita trovata</div>`;
  cont.innerHTML=html;
}

function card(m,idx) {
  const isPlayoff=m.phase!=='regular';
  const cardCls=isPlayoff?'playoff':m.team;
  const teamLabel=m.team==='virtus'?'Virtus Roma':'LUISS Roma';
  const delay=Math.min(idx*0.04,0.35);
  const todayMark=isToday(m.date)?`<span class="today-dot"></span>`:'';
  const timeEl=(!isPast(m.date)&&m.time)?`<span class="mc-time">⏰ ${m.time}</span>`:'';
  let result='';
  if(m.sh!=null&&m.sa!=null){const cls=m.sh>m.sa?'win':'loss';result=`<span class="mc-result ${cls}">${m.sh}–${m.sa}</span>`;}
  else if(!isPast(m.date)){result=`<span class="mc-result tbd">—</span>`;}
  const noteEl=m.note?`<div class="note-el">⚠️ ${m.note}</div>`:'';
  return `<div class="match-card ${cardCls}" style="animation-delay:${delay}s">
    <div class="mc-top">
      <div style="display:flex;align-items:center;gap:8px"><span class="mc-badge">${teamLabel}</span></div>
      <div style="display:flex;align-items:center;gap:6px">${timeEl}<span class="mc-date">${todayMark}${fmtDate(m.date)}</span></div>
    </div>
    <div class="mc-teams"><span class="mc-home">${m.home}</span><span class="mc-sep">vs</span><span class="mc-away">${m.away}</span></div>
    ${noteEl}
    <div class="mc-bottom"><span class="mc-round">${m.round?'Giornata '+m.round:phaseLabel(m.phase)}</span>${result}</div>
  </div>`;
}

// ================================================================
// UI CONTROLS
// ================================================================
function setTab(t){currentTab=t;document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));document.querySelector(`.tab-${t}`).classList.add('active');render();}
function setPhase(p){currentPhase=p;render();}
function setProgress(pct){const el=document.getElementById('loadingBar');if(el)el.style.width=pct+'%';}
function setStatus(type,text){const el=document.getElementById('updateStatus');el.className=`update-status ${type}`;el.textContent=text;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}

// ================================================================
// NOTIFICHE
// ================================================================
async function toggleNotif(){
  if(!('Notification' in window)){showToast('⚠️ Notifiche non supportate');return;}
  if(notifEnabled){notifEnabled=false;localStorage.setItem('brc_notif','0');render();showToast('🔕 Disattivate');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){notifEnabled=true;localStorage.setItem('brc_notif','1');scheduleNotif();render();showToast('✅ Notifiche attivate! Avviso 24h prima di ogni partita.');}
  else showToast('❌ Abilita le notifiche nelle impostazioni Chrome');
}
function scheduleNotif(){
  matches.filter(m=>!isPast(m.date)).forEach(m=>{
    const [hh,mm]=(m.time||'20:30').split(':').map(Number);
    const t=parseDate(m.date); t.setHours(hh||20,mm||30,0,0);
    const delay=t.getTime()-86400000-Date.now();
    if(delay>0&&delay<7*86400000) setTimeout(()=>{
      if(!notifEnabled)return;
      new Notification('🏀 Partita domani in casa!',{body:`${m.home} vs ${m.away}${m.time?' ore '+m.time:''} — ${phaseLabel(m.phase)}`,icon:'icon-192.png'});
    },delay);
  });
}

// ================================================================
// INIT
// ================================================================
window.addEventListener('load',async()=>{
  setStatus('loading','⏳ Caricamento');
  render();
  setProgress(10);
  await doRefresh(true);
  setTimeout(()=>document.getElementById('loadingOverlay').classList.add('hidden'),400);
  if(notifEnabled)scheduleNotif();
});
</script>
