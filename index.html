<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roma Basket">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C8102E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Roma Basket Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--v:#C8102E;--l:#003087;--g:#F5C518;--bg:#0a0a0f;--card:#13131a;--bd:rgba(255,255,255,.07);--tx:#f0f0f0;--mu:#777;--gr:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;line-height:1.5;overflow-x:hidden;-webkit-tap-highlight-color:transparent;padding-bottom:100px}
.header{position:sticky;top:0;background:rgba(10,10,15,0.8);backdrop-filter:blur(12px);z-index:100;padding:16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.header-btns{display:flex;gap:12px;align-items:center}
.btn-icon{background:none;border:none;color:var(--tx);font-size:20px;cursor:pointer;opacity:0.8}
.btn-notif.active{color:var(--g);opacity:1}
.uptime{font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase}
.filters{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter{background:var(--card);border:1px solid var(--bd);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;color:var(--mu);transition:0.2s}
.filter.active{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.container{padding:0 16px}
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--bd);position:relative;animation:fadeUp 0.4s ease-out forwards}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.tag-team{padding:2px 8px;border-radius:4px;color:#fff}
.tag-v{background:var(--v)}.tag-l{background:var(--l)}
.tag-live{background:var(--gr);color:var(--bg);padding:2px 6px;border-radius:4px;animation:pulse 1.5s infinite}
.match-grid{display:grid;grid-template-columns:1fr 60px 1fr;align-items:center;gap:12px;text-align:center}
.team-name{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:0.5px}
.score{font-family:'Bebas Neue',cursive;font-size:32px;display:flex;flex-direction:column;line-height:1}
.score-final{color:var(--tx)}
.score-time{font-size:16px;color:var(--mu)}
.card-bottom{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--mu)}
.venue{display:flex;align-items:center;gap:4px;color:var(--mu);text-decoration:none}
.countdown{background:rgba(255,255,255,0.05);padding:8px;border-radius:12px;margin-bottom:20px;text-align:center;font-size:13px;border:1px dashed var(--bd)}
.countdown b{color:var(--g)}
.standings{margin-top:20px;background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--bd)}
.st-row{display:grid;grid-template-columns:30px 1fr 40px 60px;padding:10px 16px;font-size:13px;align-items:center;border-bottom:1px solid var(--bd)}
.st-row:last-child{border:0}
.st-header{background:rgba(255,255,255,0.03);color:var(--mu);font-size:10px;font-weight:700;text-transform:uppercase}
.st-pos{font-weight:700;color:var(--mu)}
.st-pts{font-weight:700;color:var(--tx);text-align:right}
.st-rec{color:var(--mu);text-align:right;font-size:11px}
.upbadge{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--bd);padding:8px 16px;border-radius:30px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px;z-index:1000;box-shadow:0 10px 25px rgba(0,0,0,0.5)}
.upbadge.ok::before{content:'';width:8px;height:8px;background:var(--gr);border-radius:50%}
@keyframes pulse{0%{opacity:1}50%{opacity:0.5}100%{opacity:1}}
</style>
</head>
<body>

<div class="header">
    <div class="logo">🏀 Roma Basket</div>
    <div class="header-btns">
        <div id="uptime" class="uptime">—</div>
        <button class="btn-icon" onclick="location.reload()">↻</button>
        <button id="notifBtn" class="btn-icon btn-notif" onclick="toggleNotif()">🔔</button>
    </div>
</div>

<div class="filters">
    <div class="filter active" onclick="setFilter('all', this)">Tutte</div>
    <div class="filter" onclick="setFilter('virtus', this)">Virtus Roma</div>
    <div class="filter" onclick="setFilter('luiss', this)">LUISS</div>
    <div class="filter" onclick="setFilter('post', this)">Post Season</div>
</div>

<div class="container" id="app"></div>

<div id="upbadge" class="upbadge">📋 Caricamento...</div>

<script>
let matches = [];
let standings = {};
let currentFilter = 'all';
let notifEnabled = localStorage.getItem('notif') === '1';

async function loadData() {
    try {
        const res = await fetch('data.json?t=' + Date.now());
        const data = await res.json();
        
        // Fix per compatibilità campi script python
        matches = data.matches || [];
        standings = data.standings || {};
        const lastUpdate = data.last_updated || data.updated || '';
        
        if(lastUpdate) {
            const dateObj = new Date(lastUpdate);
            const timeStr = dateObj.toLocaleString('it-IT', {day:'2d', month:'2d', hour:'2d', minute:'2d'});
            document.getElementById('uptime').textContent = 'Agg: ' + timeStr;
            document.getElementById('upbadge').className = 'upbadge ok';
            document.getElementById('upbadge').textContent = '📋 ' + timeStr;
        }
        
        render();
        if(notifEnabled) scheduleNotif();
    } catch (e) {
        console.error(e);
        document.getElementById('upbadge').textContent = '⚠️ Errore dati';
    }
}

function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
}

function toDate(d) { return new Date(d); }
function isPast(d) { 
    const limit = toDate(d);
    limit.setHours(23,59,0,0);
    return new Date() > limit;
}

function render() {
    const app = document.getElementById('app');
    let html = '';

    // 1. Prossima Partita (Countdown)
    const upcoming = matches.filter(m => !isPast(m.date)).sort((a,b) => toDate(a.date) - toDate(b.date))[0];
    if(upcoming) {
        const d = toDate(upcoming.date);
        const diff = Math.ceil((d - new Date()) / 86400000);
        const dayLabel = diff === 0 ? "OGGI" : diff === 1 ? "DOMANI" : `tra ${diff} giorni`;
        html += `<div class="countdown">Prossima in casa: <b>${dayLabel}</b> (${upcoming.home} vs ${upcoming.away})</div>`;
    }

    // 2. Partite
    let filtered = matches;
    if(currentFilter === 'virtus') filtered = matches.filter(m => m.team === 'virtus');
    if(currentFilter === 'luiss') filtered = matches.filter(m => m.team === 'luiss');
    if(currentFilter === 'post') filtered = matches.filter(m => m.phase !== 'regular');
    
    filtered.sort((a,b) => toDate(b.date) - toDate(a.date)).forEach(m => {
        const past = isPast(m.date);
        const scoreHome = m.sh !== null ? m.sh : '-';
        const scoreAway = m.sa !== null ? m.sa : '-';
        
        html += `
        <div class="card">
            <div class="card-top">
                <span class="tag-team tag-${m.team[0]}">${m.team.toUpperCase()}</span>
                <span>${new Date(m.date).toLocaleDateString('it-IT', {day:'numeric', month:'short'}).toUpperCase()} • G${m.round}</span>
            </div>
            <div class="match-grid">
                <div class="team-name">${m.home}</div>
                <div class="score">
                    ${past && m.sh !== null ? 
                        `<span class="score-final">${scoreHome}-${scoreAway}</span>` : 
                        `<span class="score-time">${m.time || '20:30'}</span>`
                    }
                </div>
                <div class="team-name">${m.away}</div>
            </div>
            <div class="card-bottom">
                <a href="https://www.google.com/maps/search/?api=1&query=PalaTiziano+Roma" class="venue" target="_blank">📍 PalaTiziano</a>
                <span style="color:var(--mu)">${m.phase === 'regular' ? 'Regular Season' : 'Post Season'}</span>
            </div>
        </div>`;
    });

    // 3. Classifica
    if(Object.keys(standings).length > 0) {
        html += `
        <div class="standings">
            <div class="st-row st-header">
                <span>POS</span><span>SQUADRA</span><span style="text-align:right">PT</span><span style="text-align:right">V-P</span>
            </div>`;
        
        // Gestione sia formato array che oggetto
        const stList = Array.isArray(standings) ? standings : Object.values(standings);
        stList.sort((a,b) => a.pos - b.pos).forEach(s => {
            html += `
            <div class="st-row">
                <span class="st-pos">${s.pos}</span>
                <span style="font-weight:500">${s.team || (s === standings.virtus ? 'Virtus Roma' : 'LUISS')}</span>
                <span class="st-pts">${s.pts}</span>
                <span class="st-rec">${s.w}-${s.l}</span>
            </div>`;
        });
        html += `</div>`;
    }

    app.innerHTML = html;
}

// Notifiche
function updateNotifBtn() {
    document.getElementById('notifBtn').classList.toggle('active', notifEnabled);
}

function toggleNotif() {
    if(!notifEnabled) {
        Notification.requestPermission().then(p => {
            if(p === 'granted') {
                notifEnabled = true;
                localStorage.setItem('notif', '1');
                updateNotifBtn();
                scheduleNotif();
            }
        });
    } else {
        notifEnabled = false;
        localStorage.setItem('notif', '0');
        updateNotifBtn();
    }
}

function scheduleNotif() {
    if(!('Notification' in window)) return;
    matches.filter(m => !isPast(m.date)).forEach(m => {
        const d = toDate(m.date);
        const notifyAt = d.getTime() - 86400000; // 24h prima
        const delay = notifyAt - Date.now();
        if(delay > 0) {
            setTimeout(() => {
                if(notifEnabled) new Notification('🏀 Partita domani!', { body: `${m.home} vs ${m.away}` });
            }, delay);
        }
    });
}

// Avvio
window.addEventListener('load', loadData);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>

</body>
</html>
