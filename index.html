<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roma Basket">
<meta name="theme-color" content="#C8102E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Roma Basket Casa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--v:#C8102E;--l:#003087;--g:#F5C518;--bg:#0a0a0f;--card:#13131a;--bd:rgba(255,255,255,.07);--tx:#f0f0f0;--mu:#777;--gr:#4ade80}
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--tx);overscroll-behavior:none;padding-bottom:100px}

/* Header */
header{padding:20px 16px 10px;display:flex;justify-content:space-between;align-items:center}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.upinfo{text-align:right}.uptime{font-size:10px;color:var(--mu);display:block}
.upbadge{font-size:9px;padding:3px 8px;border-radius:20px;font-weight:700;text-transform:uppercase;margin-top:4px;display:inline-block}
.upbadge.ok{background:rgba(74,222,128,.1);color:var(--gr)}
.upbadge.wait{background:rgba(245,197,24,.1);color:var(--g)}
.upbadge.err{background:rgba(200,16,46,.1);color:var(--v)}

/* Tabs */
.tabs{display:flex;gap:8px;padding:10px 16px 20px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 18px;border-radius:25px;background:var(--card);font-size:13px;font-weight:600;white-space:nowrap;color:var(--mu);border:1px solid var(--bd);transition:all .3s}
.tab.on{background:var(--tx);color:#000;border-color:var(--tx);transform:scale(1.05)}
.tab.tv.on{background:var(--v);color:#fff;border-color:var(--v)}
.tab.tl.on{background:var(--l);color:#fff;border-color:var(--l)}

/* Standings */
.stand{display:flex;gap:8px;padding:0 16px 20px}
.schip{flex:1;padding:12px;border-radius:16px;background:var(--card);border-left:4px solid var(--mu);font-size:12px;display:flex;flex-direction:column;gap:2px}
.schip.sv{border-left-color:var(--v)}
.schip.sl{border-left-color:var(--l)}
.schip b{font-size:15px;color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:0.5px}

/* Hero Card */
.hero{margin:0 16px 25px;padding:24px;border-radius:28px;position:relative;overflow:hidden;border:1px solid var(--bd)}
.hero.hv{background:linear-gradient(135deg,#1a1a25 0%,rgba(200,16,46,.15) 100%)}
.hero.hl{background:linear-gradient(135deg,#1a1a25 0%,rgba(0,48,135,.15) 100%)}
.hlabel{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--mu);margin-bottom:12px;text-transform:uppercase}
.hteam{font-family:'Bebas Neue',sans-serif;font-size:32px;margin-bottom:15px;line-height:1}
.hteam.hv{color:var(--v)}.hteam.hl{color:var(--l)}
.hmatch{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:700;margin-bottom:12px}
.hvs{font-size:12px;color:var(--mu);font-weight:400;opacity:0.6}
.hmeta{font-size:14px;color:var(--mu);margin-bottom:20px;display:flex;align-items:center;gap:6px}
.hvenue{display:flex;gap:12px;align-items:center;background:rgba(255,255,255,.05);padding:14px;border-radius:16px}
.hvinfo{flex:1}.hvname{font-size:13px;font-weight:700;margin-bottom:2px}.hvaddr{font-size:11px;color:var(--mu)}
.hvmap{color:var(--tx);text-decoration:none;font-size:12px;font-weight:700;padding:6px 12px;background:rgba(255,255,255,.1);border-radius:10px}

/* Countdown */
.hcd{display:flex;gap:15px;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.05)}
.cdu{text-align:center}.cdn{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--tx)}.cdl{font-size:9px;color:var(--mu);text-transform:uppercase;font-weight:700;margin-top:4px}

/* Stats */
.stats{display:flex;gap:10px;padding:0 16px 25px}
.sti{flex:1;background:var(--card);padding:15px;border-radius:20px;text-align:center;border:1px solid var(--bd)}
.stn{font-family:'Bebas Neue',sans-serif;font-size:24px;margin-bottom:2px}.stl{font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase}

/* Cards List */
.slbl{padding:0 18px 12px;font-size:12px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px}
.mlist{padding:0 16px;display:flex;flex-direction:column;gap:14px}
.mcard{padding:18px;border-radius:22px;background:var(--card);border:1px solid var(--bd);display:flex;flex-direction:column;gap:14px;transition:transform 0.2s}
.mcT{display:flex;justify-content:space-between;align-items:center}
.mcbdg{font-size:10px;padding:3px 10px;border-radius:8px;background:rgba(255,255,255,.05);font-weight:700;color:var(--mu)}
.mcdt{font-size:12px;color:var(--mu);font-weight:500}
.mcmatch{font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px}
.mcsep{color:var(--mu);font-weight:400;font-size:12px;opacity:0.5}
.mcbot{display:flex;justify-content:space-between;align-items:center}
.mcrnd{font-size:11px;color:var(--mu);font-weight:600}
.mcres{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.mcres.win{color:var(--gr)}.mcres.loss{color:var(--v)}

/* Post Season (Fix) */
.ps-container { animation: fadeUp 0.4s ease both; }
.psblock{margin:0 16px 15px;background:var(--card);border:1px solid var(--bd);border-radius:20px;overflow:hidden}
.pshead{padding:18px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:linear-gradient(to right, rgba(255,255,255,0.02), transparent)}
.pstitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.psdates{font-size:11px;color:var(--mu);margin-top:2px}
.pschev{font-size:14px;transition:transform .3s;opacity:0.5}
.psblock.open .pschev{transform:rotate(180deg)}
.psbody{display:none;padding:20px;border-top:1px solid var(--bd);background:rgba(0,0,0,0.2)}
.psblock.open .psbody{display:block}
.psteam{margin-bottom:20px}.psteam:last-child{margin-bottom:0}
.pstlbl{font-size:11px;font-weight:800;text-transform:uppercase;padding:4px 10px;border-radius:8px;margin-bottom:10px;display:inline-block}
.psstatus{font-size:15px;font-weight:700;margin-bottom:6px}.psrow{font-size:13px;color:var(--mu);margin-bottom:5px;display:flex;justify-content:space-between}
.psbox{background:rgba(255,255,255,.03);padding:14px;border-radius:14px;margin-top:12px;border:1px solid rgba(255,255,255,0.03)}
.psbtitle{font-size:12px;font-weight:800;margin-bottom:10px;color:var(--g);text-transform:uppercase;letter-spacing:0.5px}
.psbrow{font-size:12px;margin-bottom:6px;display:flex;gap:10px;align-items:center}

/* Navigation */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;padding:12px 20px 32px;justify-content:space-around;z-index:100}
.ibtn{background:none;border:none;color:var(--mu);font-size:22px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all 0.2s}
.ibtn.on{color:var(--v);transform:translateY(-2px)}
.ibtn span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}

/* Utils */
#toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:12px 24px;border-radius:30px;font-size:13px;font-weight:700;z-index:1000;display:none;box-shadow:0 10px 40px rgba(0,0,0,0.4)}
#toast.show{display:block;animation:fadeUp 0.3s ease}
.spin{animation:rotate 1s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}

.sources{padding:40px 16px;opacity:0.6}.srctitle{font-size:11px;font-weight:800;margin-bottom:20px;letter-spacing:2px;color:var(--mu)}
.srcrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px}
.srcmeta{font-size:11px;color:var(--mu);margin-top:2px}
.srclink{color:var(--tx);text-decoration:none;border:1px solid var(--bd);padding:6px 14px;border-radius:10px;font-weight:600;font-size:12px}
</style>
</head>
<body>

<header>
  <div class="logo-title">🏀 Roma Basket</div>
  <div class="upinfo">
    <span id="uptime" class="uptime">Sincronizzazione...</span>
    <div id="upbadge" class="upbadge wait">Aggiornamento</div>
  </div>
</header>

<div class="tabs">
  <div class="tab ta on" onclick="setTab('all')">Tutte</div>
  <div class="tab tv" onclick="setTab('virtus')">Virtus Roma</div>
  <div class="tab tl" onclick="setTab('luiss')">LUISS Roma</div>
  <div class="tab tp" onclick="setTab('post')">Post Season</div>
</div>

<div id="appContent">
  </div>

<nav class="bnav">
  <button class="ibtn on" id="btn-home" onclick="setTab('all')">🏠<span>Home</span></button>
  <button class="ibtn" id="refreshBtn" onclick="doRefresh(true)">↻<span>Sync</span></button>
  <button class="ibtn" id="notifBtn" onclick="toggleNotif()">🔔<span>Alert</span></button>
</nav>

<div id="toast"></div>

<script>
// ============================================================
// DATA & STATE
// ============================================================
const MATCHES_INIT = [
  {id:'v35',team:'virtus',phase:'regular',round:35,date:'2026-04-11',time:'20:00',home:'Virtus GVM Roma',away:'Quarrata',sh:null,sa:null},
  {id:'l36',team:'luiss',phase:'regular',round:36,date:'2026-04-15',time:'15:00',home:'Luiss Roma',away:'Faenza',sh:null,sa:null}
];

const VENUES = {
  virtus:{name:'PalaTiziano',addr:'Piazza Apollodoro 10, Roma',maps:'https://maps.google.com/?q=PalaTiziano+Roma'},
  luiss: {name:'PalaTiziano',addr:'Piazza Apollodoro 10, Roma',maps:'https://maps.google.com/?q=PalaTiziano+Roma'}
};

let matches = JSON.parse(localStorage.getItem('brc_m')) || MATCHES_INIT;
let standings = JSON.parse(localStorage.getItem('brc_s')) || {virtus:{pos:'-',pts:'-'},luiss:{pos:'-',pts:'-'}};
let lastUpdate = localStorage.getItem('brc_lu') || null;
let currentTab = 'all';
let cdTimer = null;

// Helpers
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const toDate = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
const isPast = s => toDate(s) < today();
const isToday = s => toDate(s).getTime()===today().getTime();
const fmt = s => {
  const d=toDate(s);
  const D=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const M=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  return `${D[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]}`;
};

// Fix per gestione sia Array che Oggetto per Standings
function getTeamStats(teamKey) {
  if (Array.isArray(standings)) {
    return standings.find(s => s.team === teamKey) || {pos:'-',pts:'-',w:'-',l:'-'};
  }
  return standings[teamKey] || {pos:'-',pts:'-',w:'-',l:'-'};
}

// ============================================================
// LOGIC
// ============================================================
function doRefresh(manual) {
  if (manual) { 
    setBadge('wait', 'Sincronizzazione...'); 
    document.getElementById('refreshBtn').classList.add('spin'); 
  }
  fetch('data.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      if (data.matches) matches = data.matches;
      if (data.standings) standings = data.standings;
      
      const rawDate = data.last_updated || data.updated || new Date(); 
      lastUpdate = new Date(rawDate).toLocaleString('it-IT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      
      localStorage.setItem('brc_m', JSON.stringify(matches));
      localStorage.setItem('brc_s', JSON.stringify(standings));
      localStorage.setItem('brc_lu', lastUpdate);
      
      setBadge('ok', 'Dati Live');
      if (manual) showToast('✅ Dati aggiornati');
      render();
    })
    .catch(e => {
      console.error(e);
      setBadge('err', 'Offline');
      if (manual) showToast('⚠️ Errore connessione');
    })
    .finally(() => {
      document.getElementById('refreshBtn').classList.remove('spin');
      document.getElementById('uptime').textContent = lastUpdate ? 'Agg: ' + lastUpdate : '—';
    });
}

function render() {
  const c = document.getElementById('appContent');
  if (currentTab === 'post') { c.innerHTML = renderPost(); return; }

  const filtered = matches.filter(m => currentTab==='all' || m.team===currentTab)
    .sort((a,b)=>a.date.localeCompare(b.date));
  
  const upcoming = filtered.filter(m=>!isPast(m.date)||isToday(m.date));
  const past     = filtered.filter(m=>isPast(m.date)&&!isToday(m.date));

  let html = renderStandings();
  if (upcoming.length) html += renderHero(upcoming[0]);
  if (currentTab==='all') html += renderStats();

  if (upcoming.length) {
    html += `<div class="slbl">Prossime in casa</div><div class="mlist">`;
    upcoming.forEach((m,i) => { html += renderCard(m,i); });
    html += `</div>`;
  }
  if (past.length) {
    html += `<div class="slbl" style="margin-top:30px">Ultime giocate</div><div class="mlist">`;
    [...past].reverse().slice(0,5).forEach((m,i) => { html += renderCard(m,i+5); });
    html += `</div>`;
  }
  html += renderSources();
  c.innerHTML = html;
  startCD(upcoming[0]);
}

function renderStandings() {
  const v = getTeamStats('virtus');
  const l = getTeamStats('luiss');
  return `<div class="stand">
    <div class="schip sv"><span>VIRTUS ROMA</span><b>${v.pos}° Posto — ${v.pts} PT</b></div>
    <div class="schip sl"><span>LUISS ROMA</span><b>${l.pos}° Posto — ${l.pts} PT</b></div>
  </div>`;
}

function renderHero(m) {
  const tn = m.team==='virtus'?'Virtus GVM Roma':'LUISS Roma';
  const tc = m.team==='virtus'?'hv':'hl';
  const v  = VENUES[m.team];
  const tod = isToday(m.date) ? '<span style="background:var(--g);color:#000;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:900;margin-left:8px">OGGI</span>' : '';
  return `<div class="hero ${tc}">
    <div class="hlabel">Prossima sfida al PalaTiziano</div>
    <div class="hteam ${tc}">${tn.toUpperCase()}</div>
    <div class="hbody">
      <div class="hmatch"><span>${m.home}</span><span class="hvs">vs</span><span>${m.away}</span></div>
      <div class="hmeta">📅 ${fmt(m.date)} · ⏰ ${m.time||'TBD'} ${tod}</div>
      <div class="hvenue">
        <div class="hvinfo"><div class="hvname">${v.name}</div><div class="hvaddr">${v.addr}</div></div>
        <a class="hvmap" href="${v.maps}" target="_blank">Mappa</a>
      </div>
      <div class="hcd" id="heroCD"></div>
    </div>
  </div>`;
}

function startCD(m) {
  if (cdTimer) clearInterval(cdTimer);
  if (!m) return;
  const tick = () => {
    const el = document.getElementById('heroCD');
    if (!el) return;
    const [hh,mm] = (m.time||'20:30').split(':').map(Number);
    const t = toDate(m.date); t.setHours(hh,mm,0,0);
    const diff = t - new Date();
    if (diff <= 0) { el.innerHTML = `<div class="cdu"><div class="cdn" style="color:var(--gr)">LIVE NOW 🏀</div></div>`; return; }
    const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), mn=Math.floor((diff%3600000)/60000);
    el.innerHTML = `<div class="cdu"><div class="cdn">${d}</div><div class="cdl">Giorni</div></div><div class="cdu"><div class="cdn">${h}</div><div class="cdl">Ore</div></div><div class="cdu"><div class="cdn">${mn}</div><div class="cdl">Min</div></div>`;
  };
  tick(); cdTimer = setInterval(tick, 30000);
}

function renderStats() {
  const vA = matches.filter(m=>m.team==='virtus'&&isPast(m.date)&&m.sh!=null);
  const lA = matches.filter(m=>m.team==='luiss'&&isPast(m.date)&&m.sh!=null);
  const vw = vA.filter(m=>m.sh>m.sa).length;
  const lw = lA.filter(m=>m.sh>m.sa).length;
  return `<div class="stats">
    <div class="sti"><div class="stn" style="color:var(--v)">${vw}/${vA.length}</div><div class="stl">Virtus Casa</div></div>
    <div class="sti"><div class="stn" style="color:var(--l)">${lw}/${lA.length}</div><div class="stl">LUISS Casa</div></div>
  </div>`;
}

function renderCard(m, idx) {
  const tl = m.team==='virtus'?'Virtus Roma':'LUISS Roma';
  const res = (m.sh!=null) ? `<span class="mcres ${m.sh>m.sa?'win':'loss'}">${m.sh}–${m.sa}</span>` : `<span class="mcres" style="color:var(--mu)">—</span>`;
  return `<div class="mcard" style="animation: fadeUp 0.3s ease ${idx*0.05}s both">
    <div class="mcT"><span class="mcbdg">${tl}</span><span class="mcdt">${fmt(m.date)}</span></div>
    <div class="mcmatch"><span>${m.home}</span><span class="mcsep">vs</span><span>${m.away}</span></div>
    <div class="mcbot"><span class="mcrnd">Giornata ${m.round||'—'}</span>${res}</div>
  </div>`;
}

function renderPost() {
  const vS = getTeamStats('virtus');
  const lS = getTeamStats('luiss');
  const teamBlock = (t, s) => {
    const isV = t==='virtus';
    const pos = parseInt(s.pos) || 0;
    const isQual = pos > 0 && pos <= 6;
    return `
      <div class="psteam">
        <span class="pstlbl" style="background:${isV?var('--v'):var('--l')}; color:#fff">${isV?'Virtus GVM Roma':'LUISS Roma'}</span>
        <div class="psstatus">${isQual?'✅ Qualificata Playoff':'⚠️ In zona Play-In'}</div>
        <div class="psrow"><span>Posizione Attuale</span><b>${s.pos}° Posto</b></div>
        <div class="psrow"><span>Record</span><b>${s.w||'-'}V - ${s.l||'-'}P</b></div>
        <div class="psbox">
          <div class="psbtitle">Percorso previsto</div>
          <div class="psbrow">🏆 Tabellone ${pos<=4?'A (Testa di serie)':'B'}</div>
          <div class="psbrow">🏠 Fattore campo: ${pos<=4?'Sì (Quarti/Semi)':'No'}</div>
        </div>
      </div>`;
  };

  return `
    <div class="ps-container">
      <div style="padding:20px 16px"><h2 style="font-family:'Bebas Neue'; letter-spacing:1px; font-size:26px">Post Season 2025-26</h2></div>
      
      <div class="psblock playoff open">
        <div class="pshead" onclick="this.parentElement.classList.toggle('open')">
          <div><div class="pstitle">Playoff & Situazione</div><div class="psdates">Inizio 8 Maggio 2026</div></div>
          <span class="pschev">▼</span>
        </div>
        <div class="psbody">
          ${teamBlock('virtus', vS)}
          <div style="height:1px; background:var(--bd); margin:20px 0"></div>
          ${teamBlock('luiss', lS)}
        </div>
      </div>

      <div class="psblock info">
        <div class="pshead" onclick="this.parentElement.classList.toggle('open')">
          <div><div class="pstitle">Regolamento</div><div class="psdates">Promozioni e Retrocessioni</div></div>
          <span class="pschev">▼</span>
        </div>
        <div class="psbody">
          <div class="psrow" style="color:var(--tx); margin-bottom:10px"><b>Accesso Playoff:</b> Prime 6 classificate.</div>
          <div class="psrow" style="color:var(--tx); margin-bottom:10px"><b>Play-In:</b> Dalla 7ª alla 12ª classificata.</div>
          <div class="psrow" style="color:var(--tx)"><b>Promozioni:</b> 3 squadre totali in Serie A2.</div>
        </div>
      </div>
      ${renderSources()}
    </div>`;
}

function renderSources() {
  return `<div class="sources"><div class="srctitle">FONTI DATI</div>
    ${SOURCES.map(s=>`<div class="srcrow"><div><b>${s.name}</b><div class="srcmeta">${s.meta}</div></div><a href="${s.url}" class="srclink" target="_blank">LINK</a></div>`).join('')}
  </div>`;
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.ibtn').forEach(el=>el.classList.remove('on'));
  
  const map = {all:'ta',virtus:'tv',luiss:'tl',post:'tp'};
  document.querySelector('.tab.'+map[t]).classList.add('on');
  if(t!=='post') document.getElementById('btn-home').classList.add('on');
  render();
}

function setBadge(type, text) {
  const el = document.getElementById('upbadge');
  el.className = 'upbadge ' + type; el.textContent = text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function toggleNotif() {
  if (!('Notification' in window)) { showToast('⚠️ Non supportate'); return; }
  Notification.requestPermission().then(p => {
    if(p==='granted') showToast('✅ Notifiche attivate');
  });
}

// Init
document.getElementById('uptime').textContent = lastUpdate ? 'Agg: '+lastUpdate : 'In attesa...';
render();
setTimeout(()=>doRefresh(false), 1000);
</script>
