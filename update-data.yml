name: Aggiorna Dati Basket Roma

on:
  # Ogni lunedì alle 07:00 ora italiana (06:00 UTC invernale)
  schedule:
    - cron: '0 6 * * 1'
  # Avvio manuale dalla tab Actions su GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui aggiornamento
        run: python scripts/update_data.py

      - name: Commit se ci sono modifiche
        run: |
          git config user.name "Roma Basket Bot"
          git config user.email "bot@romabasket.app"
          git add data.json
          git diff --staged --quiet || git commit -m "🏀 Aggiornamento dati $(date +'%d/%m/%Y')" && git push || echo "Nessuna modifica"
